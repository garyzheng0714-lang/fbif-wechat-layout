name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build API server
        run: |
          cd api
          GOOS=linux GOARCH=amd64 go build -o fbif-api .

      - name: Generate deploy version file
        run: |
          cat > public/version.json <<EOF
          {
            "build": "${GITHUB_SHA}",
            "commit": "${GITHUB_SHA}",
            "deployed_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          LIBREOFFICE_URL: ${{ secrets.LIBREOFFICE_URL }}
          LIBREOFFICE_TOKEN: ${{ secrets.LIBREOFFICE_TOKEN }}
          CLOUDCONVERT_API_KEY: ${{ secrets.CLOUDCONVERT_API_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Deploy static files
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            public/ \
            "${USER}@${HOST}:${DEPLOY_PATH}/"

          # Deploy API binary
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            api/fbif-api \
            "${USER}@${HOST}:${DEPLOY_PATH}/../api/"

          # Ensure the rule preset API is routed to the Go service. The server's
          # Caddy config proxies only selected /api paths, so new API namespaces
          # must be added explicitly or they fall through to the static app.
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" "sudo python3 -" <<'PY'
          from pathlib import Path
          import re
          import sys
          import urllib.request

          site = "fbifmp-layout.foodtalks.cn"
          marker = "@fbifRulesApi"

          root = Path("/etc/caddy")
          if not root.exists():
              print("/etc/caddy does not exist", file=sys.stderr)
              sys.exit(1)

          files = []
          primary = root / "Caddyfile"
          if primary.exists():
              files.append(primary)
          files.extend(
              p for p in root.rglob("*")
              if p.is_file()
              and p != primary
              and ".bak" not in p.name
              and not p.name.endswith("~")
          )

          target = None
          for path in files:
              try:
                  text = path.read_text()
              except UnicodeDecodeError:
                  continue
              if site in text:
                  target = path
                  break

          if target is None:
              print("Could not find Caddy site config for " + site, file=sys.stderr)
              sys.exit(1)

          original = target.read_text()
          def extract_upstreams(config):
              found = []
              for token in ("/api/fetch-article-meta", "/api/fetch-article", "/api/health"):
                  at = config.find(token)
                  if at == -1:
                      continue
                  window = config[max(0, at - 500):at + 1800]
                  for line in window.splitlines():
                      stripped = line.strip()
                      if not stripped.startswith("reverse_proxy"):
                          continue
                      for part in stripped.split()[1:]:
                          if part.startswith("@") or part.startswith("/") or part == "{":
                              continue
                          if part not in found:
                              found.append(part)
              return found

          def health_url(upstream):
              if upstream.startswith("http://") or upstream.startswith("https://"):
                  base = upstream.rstrip("/")
              else:
                  base = "http://" + upstream.rstrip("/")
              return base + "/api/health"

          def is_go_api(upstream):
              try:
                  with urllib.request.urlopen(health_url(upstream), timeout=2) as resp:
                      body = resp.read(200).decode("utf-8", "replace")
                      return resp.status == 200 and '"status":"ok"' in body.replace(" ", "")
              except Exception:
                  return False

          candidates = extract_upstreams(original)
          for fallback in (
              "127.0.0.1:19090",
              "127.0.0.1:9000",
              "127.0.0.1:8080",
              "127.0.0.1:9090",
              "127.0.0.1:3000",
          ):
              if fallback not in candidates:
                  candidates.append(fallback)

          upstream = next((candidate for candidate in candidates if is_go_api(candidate)), "")
          if not upstream:
              print("Could not find a local Go API upstream with /api/health", file=sys.stderr)
              sys.exit(1)

          route = (
              "\n"
              "  @fbifRulesApi path /api/rules /api/rules/*\n"
              "  handle @fbifRulesApi {\n"
              "    reverse_proxy " + upstream + "\n"
              "  }\n"
          )

          text = re.sub(
              r"\n\s*@fbifRulesApi path /api/rules /api/rules/\*\n\s*reverse_proxy @fbifRulesApi 127\.0\.0\.1:\d+\n",
              "\n",
              original,
          )
          text = re.sub(
              r"\n\s*@fbifRulesApi path /api/rules /api/rules/\*\n\s*handle @fbifRulesApi \{\n\s*reverse_proxy 127\.0\.0\.1:\d+\n\s*\}\n",
              "\n",
              text,
          )

          insert_points = []
          scan_from = 0
          while True:
              site_at = text.find(site, scan_from)
              if site_at == -1:
                  break
              open_at = text.find("{", site_at)
              if open_at != -1:
                  insert_points.append(open_at + 1)
              scan_from = site_at + len(site)

          if not insert_points:
              print("Could not find site block opening brace in " + str(target), file=sys.stderr)
              sys.exit(1)

          backup = target.with_suffix(target.suffix + ".bak-rules")
          backup.write_text(original)
          for open_after in sorted(set(insert_points), reverse=True):
              text = text[:open_after] + route + text[open_after:]
          target.write_text(text)
          print("Ensured Caddy rule API handle in " + str(target) + " -> " + upstream)
          PY

          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" \
            "sudo caddy validate --config /etc/caddy/Caddyfile && sudo systemctl reload caddy"

          # Write env file for the fbif-api systemd service (loaded via EnvironmentFile=)
          # Tempfile + atomic rename so the service never sees a half-written file.
          ENV_CONTENT=$(printf 'LIBREOFFICE_URL=%s\nLIBREOFFICE_TOKEN=%s\nCLOUDCONVERT_API_KEY=%s\n' "$LIBREOFFICE_URL" "$LIBREOFFICE_TOKEN" "$CLOUDCONVERT_API_KEY" | base64)
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" \
            "echo '$ENV_CONTENT' | base64 -d > /var/www/api/.env.tmp && chmod 600 /var/www/api/.env.tmp && mv /var/www/api/.env.tmp /var/www/api/.env"

          # Restart API service
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" \
            "sudo systemctl restart fbif-api 2>/dev/null || true"
