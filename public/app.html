<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FBIF 微信排版工具</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
h1 { font-size: 28px; color: #1a1a1a; margin-bottom: 8px; }
.subtitle { color: #666; font-size: 15px; margin-bottom: 32px; }
.back-link { color: #0070C0; text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 16px; }
.back-link:hover { text-decoration: underline; }
.upload-zone {
  border: 2px dashed #d0d0d0; border-radius: 12px; padding: 60px 40px;
  text-align: center; background: #fff; cursor: pointer; transition: all 0.2s;
}
.upload-zone:hover, .upload-zone.dragover { border-color: #0070C0; background: #f8fbff; }
.upload-zone.processing { border-color: #faad14; background: #fffbe6; pointer-events: none; }
.upload-icon { font-size: 48px; margin-bottom: 16px; }
.upload-text { font-size: 16px; color: #333; margin-bottom: 8px; }
.upload-hint { font-size: 13px; color: #999; }
input[type="file"] { display: none; }
.progress { display: none; margin-top: 24px; }
.progress-bar { height: 4px; background: #e8e8e8; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #0070C0; width: 0%; transition: width 0.3s; }
.progress-text { font-size: 13px; color: #666; margin-top: 8px; text-align: center; }
.error { color: #ff4d4f; margin-top: 16px; font-size: 14px; display: none; }

#previewView { display: none; }
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #e8e8e8; padding: 12px 20px;
  display: flex; align-items: center; gap: 12px;
}
.toolbar h2 { font-size: 16px; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn {
  padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px;
  cursor: pointer; transition: all 0.2s; font-weight: 500; white-space: nowrap;
}
.btn-primary { background: #0070C0; color: #fff; }
.btn-primary:hover { background: #005a9e; }
.btn-primary.copied { background: #27ae60; }
.btn-draft { background: #07c160; color: #fff; }
.btn-draft:hover { background: #06ad56; }
.btn-draft.pushed { background: #27ae60; }
.btn-draft:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-secondary { background: #f0f0f0; color: #333; text-decoration: none; }
.btn-secondary:hover { background: #e0e0e0; }
.zoom-controls {
  display: flex; align-items: center; gap: 4px; background: #f0f0f0;
  border-radius: 6px; padding: 2px;
}
.zoom-controls .btn { padding: 6px 12px; font-size: 16px; min-width: 36px; }
.zoom-label { font-size: 13px; color: #666; min-width: 45px; text-align: center; }

/* ---- Layout: Preview with floating TOC ---- */
.preview-layout {
  margin-top: 60px; min-height: calc(100vh - 60px);
  position: relative;
}

/* Floating TOC — sticks to left of phone frame */
.toc-float {
  position: fixed; top: 80px; z-index: 50;
  background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 12px; max-width: 180px; max-height: calc(100vh - 120px);
  overflow-y: auto; border: 1px solid #eee;
}
.toc-title { font-size: 12px; font-weight: 600; color: #999; margin-bottom: 8px; }
.toc-list { list-style: none; }
.toc-item {
  padding: 5px 8px; font-size: 12px; color: #666; cursor: pointer;
  border-radius: 4px; margin-bottom: 1px; line-height: 1.4;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: all 0.15s; border-left: 2px solid transparent;
}
.toc-item:hover { color: #0070C0; background: #f8fbff; }
.toc-item.active { color: #0070C0; font-weight: 500; border-left-color: #0070C0; }
.toc-empty { font-size: 11px; color: #ccc; padding: 4px 8px; }

/* Preview center */
.preview-main {
  padding: 12px; overflow-y: auto; height: calc(100vh - 60px);
}
.phone-frame {
  max-width: 840px; margin: 0 auto; background: #fff;
  border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden; transition: max-width 0.3s ease;
}
.phone-frame img { max-width: 100%; height: auto; }
.stats-bar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); color: #fff; padding: 8px 20px;
  border-radius: 20px; font-size: 13px; z-index: 100;
}
</style>
</head>
<body>

<!-- Upload View -->
<div id="uploadView">
  <div class="container">
    <a href="/" class="back-link">&larr; 返回选择</a>
    <h1 id="pageTitle"></h1>
    <p class="subtitle" id="pageSubtitle"></p>
    <div class="upload-zone" id="dropZone">
      <div class="upload-icon">📄</div>
      <div class="upload-text">点击上传或拖拽文件到这里</div>
      <div class="upload-hint" id="fileHint"></div>
      <input type="file" id="fileInput">
    </div>
    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">正在排版...</div>
    </div>
    <div class="error" id="error"></div>
  </div>
</div>

<!-- Preview View -->
<div id="previewView">
  <div class="toolbar">
    <h2 id="previewTitleDisplay"></h2>
    <div class="zoom-controls">
      <button class="btn btn-secondary" onclick="zoom(-1)">-</button>
      <span class="zoom-label" id="zoomLabel">200%</span>
      <button class="btn btn-secondary" onclick="zoom(1)">+</button>
    </div>
    <button class="btn btn-secondary" onclick="goBack()">&#8592; 重新上传</button>
    <button class="btn btn-primary" id="copyBtn" onclick="copyContent()">复制正文</button>
    <button class="btn btn-draft" id="draftBtn" onclick="pushToDraft()">推送到公众号草稿箱</button>
  </div>

  <div class="preview-layout">
    <!-- Floating TOC -->
    <div class="toc-float" id="tocFloat">
      <div class="toc-title">目录</div>
      <ul class="toc-list" id="tocList">
        <li class="toc-empty">解析后显示</li>
      </ul>
    </div>

    <!-- Article Preview -->
    <div class="preview-main" id="previewMain">
      <div class="phone-frame" id="phoneFrame">
        <div id="contentArea"></div>
      </div>
    </div>
  </div>

  <!-- Hidden state elements (used by engine.js) -->
  <img id="coverImg" style="display:none;">
  <input type="text" id="titleInput" maxlength="32" style="display:none;">
  <input type="checkbox" id="footerEnabled" checked style="display:none;">
  <div class="stats-bar" id="statsBar"></div>
</div>

<script type="module">
import { initApp } from './js/engine.js';

const TEMPLATES = ['fbif', 'mote'];
const params = new URLSearchParams(location.search);
const templateId = params.get('t') || 'fbif';

if (!TEMPLATES.includes(templateId)) {
  document.getElementById('error').textContent = '未知模板: ' + templateId;
  document.getElementById('error').style.display = 'block';
} else {
  try {
    const mod = await import('./js/templates/' + templateId + '.js');
    initApp(mod.default);
  } catch (err) {
    document.getElementById('error').textContent = '模板加载失败: ' + templateId;
    document.getElementById('error').style.display = 'block';
  }
}

// Auto-set first image as cover
window._populateArticleThumbnails = function() {
  const imgs = document.getElementById('contentArea').querySelectorAll('img');
  const coverImg = document.getElementById('coverImg');
  if (imgs.length > 0 && imgs[0].src) {
    coverImg.src = imgs[0].src;
  }
};

// Build TOC from headings in content
window._buildTOC = function() {
  const tocList = document.getElementById('tocList');
  tocList.innerHTML = '';

  // Find all heading sections (font-size: 18px or font-weight: bold with larger size)
  const sections = document.getElementById('contentArea').querySelectorAll('section');
  let headingIdx = 0;

  sections.forEach(sec => {
    const span = sec.querySelector('span[textstyle]') || sec.querySelector('span');
    if (!span) return;
    const style = span.getAttribute('style') || '';
    const isBoldHeading = (style.includes('font-weight: bold') || style.includes('font-weight:bold')) &&
      (style.includes('font-size: 18px') || style.includes('font-size:18px'));
    if (!isBoldHeading) return;

    const text = sec.textContent.trim();
    if (!text) return;

    sec.id = 'heading-' + headingIdx;
    const li = document.createElement('li');
    li.className = 'toc-item';
    li.textContent = text;
    li.addEventListener('click', () => {
      sec.scrollIntoView({ behavior: 'instant', block: 'start' });
      tocList.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
      li.classList.add('active');
    });
    tocList.appendChild(li);
    headingIdx++;
  });

  if (headingIdx === 0) {
    tocList.innerHTML = '<li class="toc-empty">无标题</li>';
  }
};

// Footer toggle
window.toggleFooter = function() {
  window._updateFooter && window._updateFooter(null);
};

// Position TOC float next to phone frame
function positionTOC() {
  const toc = document.getElementById('tocFloat');
  const frame = document.getElementById('phoneFrame');
  if (!toc || !frame) return;
  const rect = frame.getBoundingClientRect();
  const tocWidth = toc.offsetWidth;
  const left = rect.left - tocWidth - 16;
  toc.style.left = Math.max(8, left) + 'px';
  toc.style.display = left > 0 ? 'block' : 'none';
}

// Scroll spy — highlight active TOC item based on scroll position
function updateScrollSpy() {
  const items = document.querySelectorAll('.toc-item');
  const previewMain = document.getElementById('previewMain');
  if (!previewMain || !items.length) return;
  const scrollTop = previewMain.scrollTop;
  let activeIdx = 0;
  items.forEach((item, idx) => {
    const headingId = 'heading-' + idx;
    const heading = document.getElementById(headingId);
    if (heading && heading.offsetTop - 100 <= scrollTop) activeIdx = idx;
  });
  items.forEach((item, idx) => item.classList.toggle('active', idx === activeIdx));
}

// Expose positionTOC for engine.js zoom callback
window._positionTOC = positionTOC;
window.addEventListener('resize', positionTOC);

// Initial and content-change observers
let _updateTimer = null;
const observer = new MutationObserver(() => {
  if (_updateTimer) clearTimeout(_updateTimer);
  _updateTimer = setTimeout(() => {
    window._populateArticleThumbnails();
    window._buildTOC();
    positionTOC();
  }, 200);
});
observer.observe(document.getElementById('contentArea'), { childList: true });

// Scroll spy
document.getElementById('previewMain').addEventListener('scroll', updateScrollSpy);
</script>
</body>
</html>
