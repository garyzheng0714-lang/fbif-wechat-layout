<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FBIF 微信排版工具</title>
<link rel="icon" type="image/png" href="/fbif-logo.png">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5/400.css" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5/500.css" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5/600.css" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5/700.css" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-sc@5/400.css" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-sc@5/700.css" crossorigin="anonymous">
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="/css/wx-theme.css">
</head>
<body>

<div class="app-layout">
  <!-- ======== Sidebar ======== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img class="sidebar-logo-img" src="/fbif-logo.png" alt="FBIF">
      <span class="sidebar-title">微信排版工具</span>
    </div>
    <div class="sidebar-body">
      <!-- Hidden compat for engine.js -->
      <span id="pageTitle" style="display:none;"></span>
      <span id="pageSubtitle" style="display:none;"></span>

      <div class="upload-zone" id="dropZone">
        <div class="upload-icon"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
        <div class="upload-text">点击或拖拽文件</div>
        <div class="upload-hint" id="fileHint">支持 .docx、.md、.txt</div>
        <input type="file" id="fileInput">
      </div>

      <div class="url-row-inline">
        <input type="url" id="urlInput" class="url-input-inline" placeholder="公众号文章链接">
        <button id="urlFetchBtn" class="url-btn-inline" onclick="fetchArticle()">提取</button>
      </div>

      <div class="progress" id="progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">正在排版...</div>
      </div>
      <div class="error" id="error"></div>
      <div class="sidebar-stats" id="statsBar"></div>
      <div class="batch-list" id="batchList" style="display:none;"></div>

      <div class="sidebar-divider"></div>
      <div class="sidebar-label settings-label">
        <span>排版设置</span>
        <button id="settingsEditBtn" class="settings-edit-btn" type="button">编辑</button>
      </div>

      <div class="settings-form" id="settingsForm" style="display: none;">
        <div class="form-row">
          <label>正文字号</label>
          <input type="number" id="cfg-font_size" value="15" min="12" max="24" step="1">
        </div>
        <div class="form-row">
          <label>标题字号</label>
          <input type="number" id="cfg-heading_size" value="18" min="14" max="32" step="1">
        </div>
        <div class="form-row">
          <label>行高</label>
          <input type="number" id="cfg-line_height" value="1.75" min="1" max="3" step="0.05">
        </div>
        <div class="form-row">
          <label>字间距</label>
          <input type="number" id="cfg-letter_spacing" value="0.034" min="0" max="0.2" step="0.002">
        </div>
        <div class="form-row">
          <label>正文颜色</label>
          <div class="color-field">
            <input type="color" id="cfg-text_color_picker" value="#544545">
            <span class="color-hex" id="cfg-text_color_hex">#544545</span>
          </div>
        </div>
        <div class="form-row">
          <label>链接颜色</label>
          <div class="color-field">
            <input type="color" id="cfg-link_color_picker" value="#0070C0">
            <span class="color-hex" id="cfg-link_color_hex">#0070C0</span>
          </div>
        </div>
        <div class="form-row">
          <label>字体</label>
          <input type="text" id="cfg-font_family" value="PingFang SC" class="font-input">
        </div>
        <div class="form-row">
          <label>页脚</label>
          <div class="toggle-switch on" id="footerToggleBtn"><div class="toggle-knob"></div></div>
        </div>
        <div class="form-row" title="仅当 DOCX 图片已经是可直接复制的 base64 时才跳过上传；如果图片仍是 blob 或服务端缓存地址，复制前会自动上传，避免图片失效。md/txt 和链接提取不受此开关影响。">
          <label>docx 跳过上传</label>
          <div class="toggle-switch" id="skipUploadToggleBtn"><div class="toggle-knob"></div></div>
        </div>
        <div class="settings-actions">
          <button id="settingsCancelBtn" type="button" class="settings-btn secondary">取消</button>
          <button id="settingsSaveBtn" type="button" class="settings-btn primary">保存</button>
        </div>
      </div>

      <div class="ma-section" id="moreArticlesSection">
        <div class="sidebar-divider"></div>
        <div class="sidebar-label ma-section-label">
          <span>更多文章</span>
          <button class="ma-reset-btn" id="maResetBtn" type="button" title="清空所有卡片">清空</button>
        </div>
        <div class="more-articles-editor" id="moreArticlesEditor">
          <!-- N card editors (dynamic, injected by more-articles-ui.js) -->
        </div>
        <div class="ma-hint" id="maHint">粘贴公众号链接自动抓取头图和标题。拖动卡片可重排顺序。</div>
      </div>
    </div>
    <div class="sidebar-footer">
      <a href="https://mp.weixin.qq.com" target="_blank" class="mp-link">微信公众号后台 →</a>
    </div>
  </aside>

  <!-- ======== Preview Panel ======== -->
  <main class="preview-panel">
    <div class="preview-toolbar" id="previewToolbar">
      <button class="tb-retry" id="retryBtn" style="display:none;" onclick="window.retryUpload && window.retryUpload()">重试上传</button>
      <button class="tb-primary" id="copyBtn" onclick="copyContent()">复制全文</button>
    </div>

    <div class="preview-scroll" id="previewScroll">
      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <p>上传文件开始预览</p>
      </div>

      <!-- Preview content -->
      <div class="preview-content" id="previewContent" style="display:none;">
        <div class="wx-header">
          <h2 class="wx-title" id="articleTitle"></h2>
          <div class="wx-meta">
            <span class="wx-meta-account">FBIF食品饮料创新</span>
            <span class="wx-meta-gray" id="wxDate"></span>
            <span class="wx-meta-gray">上海</span>
          </div>
        </div>
        <div class="phone-frame" id="phoneFrame">
          <div id="contentArea"></div>
        </div>
        <div class="copy-success" id="copySuccess">已复制到剪贴板</div>
      </div>

      <!-- WeChat footer -->
      <div class="wx-footer" id="wxFooter" style="display:none;">
        <div class="wx-footer-inner">
          <div class="wx-footer-left">
            <img class="wx-avatar" src="/fbif-avatar.webp" alt="FBIF">
            <span class="wx-footer-name">FBIF食品饮料创新</span>
            <svg class="wx-verified" viewBox="0 0 16 16" width="14" height="14"><circle cx="8" cy="8" r="7" fill="#576b95"/><path d="M5 8.2l2.2 2.2L11.5 6" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="wx-footer-actions">
            <span class="wx-action"><svg viewBox="0 0 1024 1024" width="20" height="20"><path d="M832 364.8h-147.2s19.2-64 32-179.2c6.4-57.6-38.4-115.2-102.4-121.6h-12.8c-51.2 0-83.2 32-102.4 76.8l-38.4 96c-32 64-57.6 102.4-76.8 115.2-25.6 12.8-121.6 12.8-128 12.8H128c-38.4 0-64 25.6-64 57.6v480c0 32 25.6 57.6 64 57.6h646.4c96 0 121.6-64 134.4-153.6l51.2-307.2c6.4-70.4-6.4-134.4-128-134.4z m-576 537.6H128V422.4h128v480z m640-409.6l-51.2 307.2c-12.8 57.6-12.8 102.4-76.8 102.4H320V422.4c44.8 0 70.4-6.4 89.6-19.2 32-12.8 64-64 108.8-147.2 25.6-64 38.4-96 44.8-102.4 6.4-19.2 19.2-32 44.8-32h6.4c32 0 44.8 32 44.8 51.2-12.8 102.4-32 166.4-32 166.4l-25.6 83.2h243.2c19.2 0 32 0 44.8 12.8 12.8 12.8 6.4 38.4 6.4 57.6z" fill="#7F7F7F"/></svg><span class="wx-count">59</span></span>
            <span class="wx-action"><svg viewBox="0 0 1024 1024" width="20" height="20"><path d="M922.026667 439.04l-267.221334-282.368v185.258667h-85.333333c-250.325333 0-455.253333 181.504-481.322667 413.44 115.157333-133.674667 291.925333-218.922667 480.682667-218.922667h85.077333l0.554667 185.173333 267.52-282.581333z m-438.528 189.44C268.8 662.570667 87.04 821.76 47.232 1024A529.664 529.664 0 0 1 0 805.461333C0 502.272 254.976 256.597333 569.472 256.597333V40.96a35.242667 35.242667 0 0 1 10.368-30.208 39.68 39.68 0 0 1 54.4 0l378.794667 400.298667a35.413333 35.413333 0 0 1 10.88 27.861333 35.498667 35.498667 0 0 1-10.88 27.904l-376.704 398.08a37.973333 37.973333 0 0 1-56.448 2.133333 35.114667 35.114667 0 0 1-10.410667-30.208l-0.64-215.082666c-26.88 0-53.546667 2.005333-79.701333 5.845333l-5.632 0.853333z" fill="#7F7F7F"/></svg><span class="wx-count">117</span></span>

          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Hidden compat elements for engine.js -->
<input type="hidden" id="titleInput" value="">
<span id="previewTitleDisplay" style="display:none;"></span>
<input type="checkbox" id="footerEnabled" checked style="display:none;">
<span id="zoomLabel" style="display:none;">200%</span>

<script type="module">
// ---- Version ----
async function loadVersionInfo() {
  try { const r = await fetch('/version.json?ts=' + Date.now(), { cache: 'no-store' }); if (r.ok) return await r.json(); } catch {}
  return { build: 'runtime-' + Date.now() };
}
const versionInfo = await loadVersionInfo();
const buildId = String(versionInfo.build || versionInfo.commit || Date.now());
const assetVersion = encodeURIComponent(buildId);
window.__APP_BUILD_INFO = versionInfo;
if (!new URLSearchParams(location.search).get('v')) {
  const next = new URL(location.href); next.searchParams.set('v', buildId); history.replaceState(null, '', next);
}
async function reloadIfUpdated() {
  try { const latest = await loadVersionInfo(); if (String(latest.build || latest.commit || '') !== buildId) location.reload(); } catch {}
}
window.addEventListener('focus', reloadIfUpdated);
document.addEventListener('visibilitychange', () => { if (!document.hidden) reloadIfUpdated(); });

// ---- Log ----
window._pushLog = function(level, msg, detail) {
  console.log('[FBIF]', level === 'error' ? '!' : '+', msg, detail || '');
};

// ---- Prefs ----
function loadPref(k, fb) { try { const v = localStorage.getItem(k); return v !== null ? v : fb; } catch { return fb; } }
function savePref(k, v) { try { localStorage.setItem(k, v); } catch {} }

// ---- Config (per-template defaults) ----
const TEMPLATE_DEFAULTS = {
  fbif: { font_size:'15', heading_size:'18', text_color:'#544545', link_color:'#0070C0', line_height:'1.75', letter_spacing:'0.034', font_family:'PingFang SC' },
};
function getDefaultCfg(tid) { return TEMPLATE_DEFAULTS[tid] || TEMPLATE_DEFAULTS.fbif; }
function loadConfig(tid) { try { const r = localStorage.getItem('config_' + (tid || 'fbif')); if (r) return { ...getDefaultCfg(tid), ...JSON.parse(r) }; } catch {} return { ...getDefaultCfg(tid) }; }
function saveConfig(c, tid) { try { localStorage.setItem('config_' + (tid || currentTemplateId || 'fbif'), JSON.stringify(c)); } catch {} window._activeConfig = { config: c }; }
const currentTemplateId = 'fbif';
window._activeConfig = { config: loadConfig(currentTemplateId) };

let footerEnabledPref = loadPref('footer_enabled', 'true') === 'true';
let skipUploadPref = loadPref('skip_upload', 'true') === 'true';
window._skipUpload = skipUploadPref;

// ---- Load engine + template ----
const { initApp } = await import('./js/engine.js?v=' + assetVersion);
const { initMoreArticlesEditor } = await import('./js/more-articles-ui.js?v=' + assetVersion);
const { openCropEditor } = await import('./js/crop-editor.js?v=' + assetVersion);
initMoreArticlesEditor({ openCropEditor });

async function loadTemplate(templateId) {
  const cfg = loadConfig(templateId);
  saveConfig(cfg, templateId);
  populateConfigForm();
  const mod = await import('./js/templates/' + templateId + '.js?v=' + assetVersion);
  initApp(mod.default);
  wrapEngineFunctions();
}

await loadTemplate(currentTemplateId);

document.getElementById('footerEnabled').checked = footerEnabledPref;
updateFooterBtn();

// ---- Footer toggle ----
function updateFooterBtn() {
  const on = document.getElementById('footerEnabled').checked;
  document.getElementById('footerToggleBtn').classList.toggle('on', on);
}
document.getElementById('footerToggleBtn').addEventListener('click', () => {
  const el = document.getElementById('footerEnabled');
  el.checked = !el.checked;
  footerEnabledPref = el.checked;
  savePref('footer_enabled', String(el.checked));
  updateFooterBtn();
  window._updateFooter && window._updateFooter(null);
});

// ---- Skip-upload toggle (experimental) ----
const skipUploadBtn = document.getElementById('skipUploadToggleBtn');
skipUploadBtn.classList.toggle('on', skipUploadPref);
skipUploadBtn.addEventListener('click', () => {
  skipUploadPref = !skipUploadPref;
  window._skipUpload = skipUploadPref;
  savePref('skip_upload', String(skipUploadPref));
  skipUploadBtn.classList.toggle('on', skipUploadPref);
});

// ---- Config form ----
function populateConfigForm() {
  const c = loadConfig(currentTemplateId);
  document.getElementById('cfg-font_size').value = parseFloat(c.font_size) || 15;
  document.getElementById('cfg-heading_size').value = parseFloat(c.heading_size) || 18;
  document.getElementById('cfg-line_height').value = parseFloat(c.line_height) || 1.75;
  document.getElementById('cfg-letter_spacing').value = parseFloat(c.letter_spacing) || 0.034;
  document.getElementById('cfg-font_family').value = c.font_family || 'PingFang SC';
  document.getElementById('cfg-text_color_picker').value = c.text_color || '#544545';
  document.getElementById('cfg-text_color_hex').textContent = c.text_color || '#544545';
  document.getElementById('cfg-link_color_picker').value = c.link_color || '#0070C0';
  document.getElementById('cfg-link_color_hex').textContent = c.link_color || '#0070C0';
}
populateConfigForm();

// Typography settings are gated behind an explicit "编辑 → 保存" flow so the
// user isn't accidentally changing things while scrolling. Changes only
// reach the preview after the user clicks 保存.
function readFormIntoConfig(c) {
  c.font_size = document.getElementById('cfg-font_size').value;
  c.heading_size = document.getElementById('cfg-heading_size').value;
  c.line_height = document.getElementById('cfg-line_height').value;
  c.letter_spacing = document.getElementById('cfg-letter_spacing').value;
  c.font_family = document.getElementById('cfg-font_family').value;
  c.text_color = document.getElementById('cfg-text_color_picker').value;
  c.link_color = document.getElementById('cfg-link_color_picker').value;
  return c;
}

// Live-update the hex label next to color pickers during editing, purely visual.
document.getElementById('settingsForm').addEventListener('input', (e) => {
  if (e.target.id === 'cfg-text_color_picker') {
    document.getElementById('cfg-text_color_hex').textContent = e.target.value;
  } else if (e.target.id === 'cfg-link_color_picker') {
    document.getElementById('cfg-link_color_hex').textContent = e.target.value;
  }
});

function setSettingsOpen(open) {
  document.getElementById('settingsForm').style.display = open ? '' : 'none';
  document.getElementById('settingsEditBtn').style.display = open ? 'none' : '';
}

document.getElementById('settingsEditBtn').addEventListener('click', () => {
  populateConfigForm();
  setSettingsOpen(true);
});

document.getElementById('settingsCancelBtn').addEventListener('click', () => {
  populateConfigForm();
  setSettingsOpen(false);
});

document.getElementById('settingsSaveBtn').addEventListener('click', () => {
  const c = readFormIntoConfig(loadConfig(currentTemplateId));
  saveConfig(c, currentTemplateId);
  if (window.updateThemePreview) window.updateThemePreview(c);
  setSettingsOpen(false);
});

// ---- Title display ----
const titleInput = document.getElementById('titleInput');
const articleTitle = document.getElementById('articleTitle');
const _od = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
Object.defineProperty(titleInput, 'value', {
  get() { return _od.get.call(this); },
  set(v) { _od.set.call(this, v); articleTitle.textContent = v; },
});

// ---- Set date ----
{
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
  const h = String(now.getHours()).padStart(2, '0'), mi = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('wxDate').textContent = y + '年' + m + '月' + d + '日 ' + h + ':' + mi;
}

// ---- Wrap engine functions for split layout ----
function wrapEngineFunctions() {
  if (window.copyContent) {
    const origCopy = window.copyContent;
    window.copyContent = async function() {
      const btn = document.getElementById('copyBtn');
      const ok = await origCopy();
      if (ok === false) return;
      document.getElementById('copySuccess').style.display = 'block';
      setTimeout(() => {
        btn.textContent = '复制全文'; btn.classList.remove('copied');
        document.getElementById('copySuccess').style.display = 'none';
      }, 10000);
    };
  }
  if (window.goBack) {
    const origGoBack = window.goBack;
    window.goBack = function() {
      origGoBack();
      document.getElementById('copySuccess').style.display = 'none';
    };
  }
}

window._buildTOC = function() {};
window._positionTOC = function() {};

// ---- URL repost ----
window.fetchArticle = async function() {
  const urlInput = document.getElementById('urlInput');
  const btn = document.getElementById('urlFetchBtn');
  const errorEl = document.getElementById('error');
  const url = (urlInput.value || '').trim();
  if (!url) return;
  errorEl.style.display = 'none';
  btn.disabled = true; btn.textContent = '提取中...';
  try {
    const resp = await fetch('/api/fetch-article', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url }) });
    if (!resp.ok) { const err = await resp.json().catch(() => ({ error: 'HTTP ' + resp.status })); throw new Error(err.error || '抓取失败'); }
    const payload = await resp.json();
    const { title, blocks, content } = payload;
    // Preferred: structured blocks from direct HTML parse. Preserves visual
    // signals (font-size/color/align/bold) so headings vs pullquotes vs
    // captions are classified deterministically — no lossy MD intermediate.
    if (Array.isArray(blocks) && blocks.length > 0) {
      if (!window._handleBlocks) throw new Error('blocks 路径未就绪');
      window._handleBlocks({ title, blocks }, { isRepost: true });
    } else if (content) {
      // Fallback: x-reader returned Markdown. Push it through the legacy
      // classifyMd pipeline via a synthetic File.
      const file = new File([content], (title || 'article') + '.md', { type: 'text/markdown' });
      if (window._handleFile) {
        window._handleFile(file, { isRepost: true });
      } else {
        const fi = document.getElementById('fileInput');
        const dt = new DataTransfer(); dt.items.add(file); fi.files = dt.files;
        fi.dispatchEvent(new Event('change'));
      }
    } else {
      throw new Error('文章内容为空');
    }
  } catch (e) { errorEl.textContent = '提取失败: ' + e.message; errorEl.style.display = 'block'; }
  finally { btn.disabled = false; btn.textContent = '提取'; }
};

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', (e) => {
  const hasPreview = document.getElementById('previewContent').style.display !== 'none';
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && hasPreview) { e.preventDefault(); window.copyContent && window.copyContent(); }
});
document.addEventListener('paste', (e) => {
  const ae = document.activeElement;
  if (ae === document.getElementById('urlInput')) return;
  // Don't hijack pastes destined for the "更多文章" card URL inputs —
  // those have their own fetch flow.
  if (ae && ae.classList && ae.classList.contains('ma-url')) return;
  // Don't hijack pastes inside any other text input either.
  const tag = ae && ae.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  const text = (e.clipboardData || window.clipboardData).getData('text').trim();
  if (text && /^https?:\/\//i.test(text)) {
    e.preventDefault();
    document.getElementById('urlInput').value = text;
    window.fetchArticle();
  }
});

// Paste directly into the URL input: auto-fetch without pressing Enter / 提取.
// setTimeout 0 waits for the browser to insert the pasted text as a task;
// a microtask would read .value === '' and silently skip.
(() => {
  const urlInput = document.getElementById('urlInput');
  if (!urlInput) return;
  urlInput.addEventListener('paste', () => {
    setTimeout(() => {
      const v = (urlInput.value || '').trim();
      if (/^https?:\/\//i.test(v)) window.fetchArticle();
    }, 0);
  });
  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); window.fetchArticle(); }
  });
})();
</script>
