<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FBIF 微信排版工具</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
h1 { font-size: 28px; color: #1a1a1a; margin-bottom: 8px; }
.subtitle { color: #666; font-size: 15px; margin-bottom: 32px; }
.back-link { color: #0070C0; text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 16px; }
.back-link:hover { text-decoration: underline; }
.upload-zone {
  border: 2px dashed #d0d0d0; border-radius: 12px; padding: 60px 40px;
  text-align: center; background: #fff; cursor: pointer; transition: all 0.2s;
}
.upload-zone:hover, .upload-zone.dragover { border-color: #0070C0; background: #f8fbff; }
.upload-zone.processing { border-color: #faad14; background: #fffbe6; pointer-events: none; }
.upload-icon { font-size: 48px; margin-bottom: 16px; }
.upload-text { font-size: 16px; color: #333; margin-bottom: 8px; }
.upload-hint { font-size: 13px; color: #999; }
input[type="file"] { display: none; }
.progress { display: none; margin-top: 24px; }
.progress-bar { height: 4px; background: #e8e8e8; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #0070C0; width: 0%; transition: width 0.3s; }
.progress-text { font-size: 13px; color: #666; margin-top: 8px; text-align: center; }
.error { color: #ff4d4f; margin-top: 16px; font-size: 14px; display: none; }

#previewView { display: none; }
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #e8e8e8; padding: 12px 20px;
  display: flex; align-items: center; gap: 12px;
}
.toolbar h2 { font-size: 16px; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn {
  padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px;
  cursor: pointer; transition: all 0.2s; font-weight: 500; white-space: nowrap;
}
.btn-primary { background: #0070C0; color: #fff; }
.btn-primary:hover { background: #005a9e; }
.btn-primary.copied { background: #27ae60; }
.btn-draft { background: #07c160; color: #fff; }
.btn-draft:hover { background: #06ad56; }
.btn-draft.pushed { background: #27ae60; }
.btn-draft:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-secondary { background: #f0f0f0; color: #333; text-decoration: none; }
.btn-secondary:hover { background: #e0e0e0; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.zoom-controls {
  display: flex; align-items: center; gap: 4px; background: #f0f0f0;
  border-radius: 6px; padding: 2px;
}
.zoom-controls .btn { padding: 6px 12px; font-size: 16px; min-width: 36px; }
.zoom-label { font-size: 13px; color: #666; min-width: 45px; text-align: center; }

/* ---- Three-column layout: TOC | Preview | Settings ---- */
.preview-layout {
  display: flex; margin-top: 60px; min-height: calc(100vh - 60px);
}

/* Left TOC */
.toc-sidebar {
  width: 220px; min-width: 220px; background: #fff; border-right: 1px solid #e8e8e8;
  padding: 16px 12px; overflow-y: auto; position: sticky; top: 60px;
  height: calc(100vh - 60px);
}
.toc-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 12px; }
.toc-list { list-style: none; }
.toc-item {
  padding: 6px 8px; font-size: 13px; color: #666; cursor: pointer;
  border-radius: 4px; margin-bottom: 2px; line-height: 1.4;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: all 0.15s;
}
.toc-item:hover { background: #f0f6ff; color: #0070C0; }
.toc-item.active { background: #e6f0ff; color: #0070C0; font-weight: 500; }
.toc-empty { font-size: 12px; color: #bbb; padding: 8px; }

/* Center preview */
.preview-main {
  flex: 1; padding: 12px; overflow-y: auto;
  height: calc(100vh - 60px);
}
.phone-frame {
  max-width: 840px; margin: 0 auto; background: #fff;
  border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden; transition: max-width 0.3s ease;
}
.phone-header { background: #ededed; padding: 8px 16px; text-align: center; }
.phone-header span { font-size: 12px; color: #999; }
.phone-body { padding: 16px 0; }

/* Right settings panel */
.settings-sidebar {
  width: 260px; min-width: 260px; background: #fff; border-left: 1px solid #e8e8e8;
  padding: 16px; overflow-y: auto; position: sticky; top: 60px;
  height: calc(100vh - 60px); display: flex; flex-direction: column; gap: 16px;
}
.settings-section { display: flex; flex-direction: column; gap: 8px; }
.settings-label {
  font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase;
  letter-spacing: 0.5px;
}
.settings-input {
  width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 6px;
  font-size: 13px; font-family: inherit; outline: none; background: #fafafa;
}
.settings-input:focus { border-color: #0070C0; background: #fff; }
.cover-select {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.cover-thumb {
  width: 44px; height: 44px; border-radius: 4px; overflow: hidden;
  cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s;
  background: #f5f5f5;
}
.cover-thumb:hover { border-color: #a0c4e8; }
.cover-thumb.selected { border-color: #0070C0; }
.cover-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cover-upload-btn {
  width: 44px; height: 44px; border-radius: 4px; border: 1.5px dashed #ccc;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; background: #fafafa; font-size: 18px; color: #bbb;
}
.cover-upload-btn:hover { border-color: #0070C0; color: #0070C0; }

/* Footer toggle */
.footer-row {
  display: flex; align-items: center; justify-content: space-between;
}
.toggle-switch {
  position: relative; display: inline-block; width: 36px; height: 20px;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer; inset: 0;
  background: #ccc; border-radius: 20px; transition: 0.2s;
}
.toggle-slider::before {
  content: ""; position: absolute; width: 16px; height: 16px;
  left: 2px; bottom: 2px; background: #fff; border-radius: 50%;
  transition: 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.toggle-switch input:checked + .toggle-slider { background: #07c160; }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }

.stats-bar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); color: #fff; padding: 8px 20px;
  border-radius: 20px; font-size: 13px; z-index: 100;
}
.footer-edit-tip {
  position: fixed; background: rgba(0,0,0,0.75); color: #fff;
  padding: 4px 10px; border-radius: 4px; font-size: 11px;
  pointer-events: none; z-index: 200; display: none;
}
</style>
</head>
<body>

<!-- Upload View -->
<div id="uploadView">
  <div class="container">
    <a href="/" class="back-link">&larr; 返回选择</a>
    <h1 id="pageTitle"></h1>
    <p class="subtitle" id="pageSubtitle"></p>
    <div class="upload-zone" id="dropZone">
      <div class="upload-icon">📄</div>
      <div class="upload-text">点击上传或拖拽文件到这里</div>
      <div class="upload-hint" id="fileHint"></div>
      <input type="file" id="fileInput">
    </div>
    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">正在排版...</div>
    </div>
    <div class="error" id="error"></div>
  </div>
</div>

<!-- Preview View -->
<div id="previewView">
  <div class="toolbar">
    <h2 id="previewTitleDisplay"></h2>
    <div class="zoom-controls">
      <button class="btn btn-secondary" onclick="zoom(-1)">-</button>
      <span class="zoom-label" id="zoomLabel">200%</span>
      <button class="btn btn-secondary" onclick="zoom(1)">+</button>
    </div>
    <button class="btn btn-secondary" onclick="goBack()">&#8592; 重新上传</button>
    <button class="btn btn-primary" id="copyBtn" onclick="copyContent()">复制正文</button>
    <button class="btn btn-draft" id="draftBtn" onclick="pushToDraft()">推送到草稿箱</button>
  </div>

  <div class="preview-layout">
    <!-- Left: Table of Contents -->
    <div class="toc-sidebar">
      <div class="toc-title">目录</div>
      <ul class="toc-list" id="tocList">
        <li class="toc-empty">上传文件后显示目录</li>
      </ul>
    </div>

    <!-- Center: Article Preview -->
    <div class="preview-main" id="previewMain">
      <div class="phone-frame" id="phoneFrame">
        <div class="phone-header"><span>微信公众号预览</span></div>
        <div class="phone-body" id="contentArea"></div>
      </div>
    </div>

    <!-- Right: Settings -->
    <div class="settings-sidebar">
      <!-- Title -->
      <div class="settings-section">
        <div class="settings-label">标题</div>
        <input type="text" class="settings-input" id="titleInput" maxlength="32"
          placeholder="文章标题（最多32字）">
      </div>

      <!-- Cover -->
      <div class="settings-section">
        <div class="settings-label">封面图</div>
        <div class="cover-select" id="articleThumbnails"></div>
        <input type="file" id="coverInput" accept="image/*" style="display:none">
        <img id="coverImg" style="display:none;">
      </div>

      <!-- Footer -->
      <div class="settings-section">
        <div class="footer-row">
          <div class="settings-label">底部模板</div>
          <label class="toggle-switch">
            <input type="checkbox" id="footerEnabled" checked onchange="toggleFooter()">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Spacer -->
      <div style="flex:1;"></div>

      <!-- Stats -->
      <div style="font-size:12px; color:#bbb; text-align:center;" id="sidebarStats"></div>
    </div>
  </div>

  <div class="stats-bar" id="statsBar"></div>
  <div class="footer-edit-tip" id="footerEditTip"></div>
  <input type="file" id="footerImgReplace" accept="image/*" style="display:none">
  <!-- Hidden elements for footer WYSIWYG -->
  <div id="footerPreview" style="display:none;"></div>
</div>

<script type="module">
import { initApp } from './js/engine.js';

const TEMPLATES = ['fbif', 'mote'];
const params = new URLSearchParams(location.search);
const templateId = params.get('t') || 'fbif';

if (!TEMPLATES.includes(templateId)) {
  document.getElementById('error').textContent = '未知模板: ' + templateId;
  document.getElementById('error').style.display = 'block';
} else {
  try {
    const mod = await import('./js/templates/' + templateId + '.js');
    initApp(mod.default);
  } catch (err) {
    document.getElementById('error').textContent = '模板加载失败: ' + templateId;
    document.getElementById('error').style.display = 'block';
  }
}

// Cover image change handler
document.getElementById('coverInput').addEventListener('change', function() {
  if (this.files[0]) {
    const r = new FileReader();
    r.onload = e => { setCoverImage(e.target.result); };
    r.readAsDataURL(this.files[0]);
  }
});

function setCoverImage(src) {
  const img = document.getElementById('coverImg');
  img.src = src;
  img.style.display = 'block';
  document.querySelectorAll('.cover-thumb').forEach(t => {
    t.classList.toggle('selected', t.dataset.src === src);
  });
}

// Populate article thumbnails for cover selection
window._populateArticleThumbnails = function() {
  const grid = document.getElementById('articleThumbnails');
  grid.innerHTML = '';
  const imgs = document.getElementById('contentArea').querySelectorAll('img');
  const seen = new Set();
  let first = true;

  imgs.forEach(img => {
    const src = img.src;
    if (!src || seen.has(src)) return;
    seen.add(src);
    const thumb = document.createElement('div');
    thumb.className = 'cover-thumb' + (first ? ' selected' : '');
    thumb.dataset.src = src;
    thumb.innerHTML = '<img src="' + src.replace(/"/g, '&quot;') + '">';
    thumb.addEventListener('click', () => setCoverImage(src));
    grid.appendChild(thumb);
    if (first) { setCoverImage(src); first = false; }
  });

  // Upload button
  const uploadBtn = document.createElement('div');
  uploadBtn.className = 'cover-upload-btn';
  uploadBtn.textContent = '+';
  uploadBtn.addEventListener('click', () => document.getElementById('coverInput').click());
  grid.appendChild(uploadBtn);
};

// Title sync
document.getElementById('titleInput').addEventListener('input', function() {
  document.getElementById('previewTitleDisplay').textContent = this.value;
});

// Build TOC from headings in content
window._buildTOC = function() {
  const tocList = document.getElementById('tocList');
  const previewMain = document.getElementById('previewMain');
  tocList.innerHTML = '';

  // Find all heading sections (font-size: 18px or font-weight: bold with larger size)
  const sections = document.getElementById('contentArea').querySelectorAll('section');
  let headingIdx = 0;

  sections.forEach(sec => {
    const span = sec.querySelector('span[textstyle]') || sec.querySelector('span');
    if (!span) return;
    const style = span.getAttribute('style') || '';
    const isBoldHeading = (style.includes('font-weight: bold') || style.includes('font-weight:bold')) &&
      (style.includes('font-size: 18px') || style.includes('font-size:18px'));
    if (!isBoldHeading) return;

    const text = sec.textContent.trim();
    if (!text) return;

    sec.id = 'heading-' + headingIdx;
    const li = document.createElement('li');
    li.className = 'toc-item';
    li.textContent = text;
    li.addEventListener('click', () => {
      sec.scrollIntoView({ behavior: 'smooth', block: 'center' });
      tocList.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
      li.classList.add('active');
    });
    tocList.appendChild(li);
    headingIdx++;
  });

  if (headingIdx === 0) {
    tocList.innerHTML = '<li class="toc-empty">无标题</li>';
  }
};

// Footer toggle
window.toggleFooter = function() {
  const enabled = document.getElementById('footerEnabled').checked;
  window._updateFooter && window._updateFooter(null);
};

// WYSIWYG footer editing on content area images (footer part)
window._initFooterEditor = function() {
  // Footer images in contentArea are editable via click
};

// MutationObserver for content changes
let _updateTimer = null;
const observer = new MutationObserver(() => {
  if (_updateTimer) clearTimeout(_updateTimer);
  _updateTimer = setTimeout(() => {
    window._populateArticleThumbnails();
    window._buildTOC();
  }, 200);
});
observer.observe(document.getElementById('contentArea'), { childList: true });
</script>
</body>
</html>
