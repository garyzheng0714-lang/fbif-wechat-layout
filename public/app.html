<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FBIF 微信排版工具</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5/400.css" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5/500.css" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5/600.css" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5/500.css" crossorigin="anonymous">
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="/css/wx-theme.css">
</head>
<body>

<!-- Upload View -->
<div id="uploadView">
  <div class="container">
    <h1>FBIF 微信排版工具</h1>
    <p class="subtitle" id="pageSubtitle">上传文档，一键生成微信公众号格式</p>
    <span id="pageTitle" style="display:none;"></span>

    <div class="template-pills" id="templatePills">
      <button class="template-pill active" data-template="fbif">FBIF 公众号</button>
      <button class="template-pill" data-template="mote">Mote 排版</button>
    </div>

    <div class="upload-zone" id="dropZone">
      <div class="upload-icon"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
      <div class="upload-text">点击或拖拽文件到这里</div>
      <div class="upload-hint" id="fileHint">支持 .docx、.md、.txt 格式</div>
      <input type="file" id="fileInput">
    </div>

    <div class="divider-or"><span>或</span></div>

    <div class="url-row">
      <input type="url" id="urlInput" class="url-input" placeholder="粘贴微信公众号文章链接提取">
      <button id="urlFetchBtn" class="url-btn" onclick="fetchArticle()">抓取</button>
    </div>

    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">正在排版...</div>
    </div>
    <div class="error" id="error"></div>
    <div class="batch-list" id="batchList" style="display:none;"></div>
  </div>
</div>

<!-- Preview View -->
<div id="previewView">
  <!-- Toolbar: back + all action buttons -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="tb-back" id="backBtn" title="Esc">← 返回</button>
    </div>
    <div class="toolbar-center">
      <span class="tb-stats" id="statsBar"></span>
    </div>
    <div class="toolbar-right">
      <button class="tb-primary" id="copyBtn" onclick="copyContent()">复制到公众号</button>
      <button class="tb-icon" id="settingsBtn" onclick="toggleSettingsPanel()" title="设置"><svg viewBox="0 0 1024 1024" width="20" height="20"><path d="M512 352c-88.4 0-160 71.6-160 160s71.6 160 160 160 160-71.6 160-160-71.6-160-160-160z m0 256c-53 0-96-43-96-96s43-96 96-96 96 43 96 96-43 96-96 96z" fill="#888"/><path d="M924.8 385.6l-89.6-15.2c-7.2-24-16.8-46.4-28.8-68l52-74.4c8-11.2 6.4-27.2-3.2-36.8l-90.4-90.4c-9.6-9.6-25.6-11.2-36.8-3.2l-74.4 52c-21.6-12-44-21.6-68-28.8l-15.2-89.6C568 17.6 556 8 542.4 8h-128c-13.6 0-25.6 9.6-28 23.2l-15.2 89.6c-24 7.2-46.4 16.8-68 28.8l-74.4-52c-11.2-8-27.2-6.4-36.8 3.2L102 191.2c-9.6 9.6-11.2 25.6-3.2 36.8l52 74.4c-12 21.6-21.6 44-28.8 68l-89.6 15.2C18.8 388 8 400 8 413.6v128c0 13.6 9.6 25.6 23.2 28l89.6 15.2c7.2 24 16.8 46.4 28.8 68l-52 74.4c-8 11.2-6.4 27.2 3.2 36.8l90.4 90.4c9.6 9.6 25.6 11.2 36.8 3.2l74.4-52c21.6 12 44 21.6 68 28.8l15.2 89.6c2.4 13.6 14.4 23.2 28 23.2h128c13.6 0 25.6-9.6 28-23.2l15.2-89.6c24-7.2 46.4-16.8 68-28.8l74.4 52c11.2 8 27.2 6.4 36.8-3.2l90.4-90.4c9.6-9.6 11.2-25.6 3.2-36.8l-52-74.4c12-21.6 21.6-44 28.8-68l89.6-15.2c13.6-2.4 23.2-14.4 23.2-28v-128c0-13.6-10.4-25.6-24-28zM884 536l-84 14.4c-10.4 1.6-18.4 8.8-21.6 18.4-8 24-19.2 46.4-33.6 67.2-5.6 8-6.4 19.2-1.6 28l48.8 69.6-60 60-69.6-48.8c-8.8-6.4-20-5.6-28 1.6-20.8 14.4-43.2 25.6-67.2 33.6-9.6 3.2-16.8 11.2-18.4 21.6L534.4 886h-84l-14.4-84c-1.6-10.4-8.8-18.4-18.4-21.6-24-8-46.4-19.2-67.2-33.6-8-5.6-19.2-6.4-28-1.6l-69.6 48.8-60-60 48.8-69.6c6.4-8.8 5.6-20-1.6-28-14.4-20.8-25.6-43.2-33.6-67.2-3.2-9.6-11.2-16.8-21.6-18.4L100 536v-84l84-14.4c10.4-1.6 18.4-8.8 21.6-18.4 8-24 19.2-46.4 33.6-67.2 5.6-8 6.4-19.2 1.6-28l-48.8-69.6 60-60 69.6 48.8c8.8 6.4 20 5.6 28-1.6 20.8-14.4 43.2-25.6 67.2-33.6 9.6-3.2 16.8-11.2 18.4-21.6L450.4 102h84l14.4 84c1.6 10.4 8.8 18.4 18.4 21.6 24 8 46.4 19.2 67.2 33.6 8 5.6 19.2 6.4 28 1.6l69.6-48.8 60 60-48.8 69.6c-6.4 8.8-5.6 20 1.6 28 14.4 20.8 25.6 43.2 33.6 67.2 3.2 9.6 11.2 16.8 21.6 18.4l84 14.4v84z" fill="#888"/></svg></button>
    </div>
    <!-- Hidden compat for engine.js -->
    <button id="retryBtn" style="display:none;"></button>
  </div>

  <!-- Hidden compat elements -->
  <input type="hidden" id="titleInput" value="">
  <span id="previewTitleDisplay" style="display:none;"></span>
  <input type="checkbox" id="footerEnabled" checked style="display:none;">
  <span id="zoomLabel" style="display:none;">200%</span>

  <!-- Settings dropdown panel -->
  <div class="dropdown-panel settings-panel" id="settingsPanel">
    <div class="panel-header">排版设置<button class="panel-close" onclick="toggleSettingsPanel()">×</button></div>
    <div class="settings-form" id="settingsForm">
      <div class="form-row">
        <label>正文字号</label>
        <input type="number" id="cfg-font_size" value="15" min="12" max="24" step="1">
      </div>
      <div class="form-row">
        <label>标题字号</label>
        <input type="number" id="cfg-heading_size" value="18" min="14" max="32" step="1">
      </div>
      <div class="form-row">
        <label>行高</label>
        <input type="number" id="cfg-line_height" value="1.75" min="1" max="3" step="0.05">
      </div>
      <div class="form-row">
        <label>字间距</label>
        <input type="number" id="cfg-letter_spacing" value="0.034" min="0" max="0.2" step="0.002">
      </div>
      <div class="form-row">
        <label>正文颜色</label>
        <div class="color-field">
          <input type="color" id="cfg-text_color_picker" value="#544545">
          <span class="color-hex" id="cfg-text_color_hex">#544545</span>
        </div>
      </div>
      <div class="form-row">
        <label>链接颜色</label>
        <div class="color-field">
          <input type="color" id="cfg-link_color_picker" value="#0070C0">
          <span class="color-hex" id="cfg-link_color_hex">#0070C0</span>
        </div>
      </div>
      <div class="form-row">
        <label>字体</label>
        <input type="text" id="cfg-font_family" value="PingFang SC" class="font-input">
      </div>
      <div class="form-row">
        <label>页脚</label>
        <div class="toggle-switch on" id="footerToggleBtn"><div class="toggle-knob"></div></div>
      </div>
    </div>
  </div>

  <!-- Overlay for closing panels -->
  <div class="panel-overlay" id="panelOverlay" onclick="closeAllPanels()"></div>

  <!-- Main content: WeChat article replica -->
  <div class="preview-content">
    <!-- WeChat header: title + author line -->
    <div class="wx-header">
      <h2 class="wx-title" id="articleTitle"></h2>
      <div class="wx-meta">
        <span class="wx-meta-account">FBIF食品饮料创新</span>
        <span class="wx-meta-gray" id="wxDate"></span>
        <span class="wx-meta-gray">上海</span>
      </div>
    </div>

    <!-- Article body -->
    <div class="phone-frame" id="phoneFrame">
      <div id="contentArea"></div>
    </div>

    <!-- WeChat footer: fixed bottom bar -->
    <div class="wx-footer">
      <div class="wx-footer-inner">
        <div class="wx-footer-left">
          <img class="wx-avatar" src="/fbif-avatar.webp" alt="FBIF">
          <span class="wx-footer-name">FBIF食品饮料创新</span>

        </div>
        <div class="wx-footer-actions">

          <span class="wx-action">
            <svg viewBox="0 0 1024 1024" width="20" height="20"><path d="M922.026667 439.04l-267.221334-282.368v185.258667h-85.333333c-250.325333 0-455.253333 181.504-481.322667 413.44 115.157333-133.674667 291.925333-218.922667 480.682667-218.922667h85.077333l0.554667 185.173333 267.52-282.581333z m-438.528 189.44C268.8 662.570667 87.04 821.76 47.232 1024A529.664 529.664 0 0 1 0 805.461333C0 502.272 254.976 256.597333 569.472 256.597333V40.96a35.242667 35.242667 0 0 1 10.368-30.208 39.68 39.68 0 0 1 54.4 0l378.794667 400.298667a35.413333 35.413333 0 0 1 10.88 27.861333 35.498667 35.498667 0 0 1-10.88 27.904l-376.704 398.08a37.973333 37.973333 0 0 1-56.448 2.133333 35.114667 35.114667 0 0 1-10.410667-30.208l-0.64-215.082666c-26.88 0-53.546667 2.005333-79.701333 5.845333l-5.632 0.853333z" fill="#7F7F7F"/></svg>

    <div class="copy-success" id="copySuccess">✓ 已复制到剪贴板，正在打开微信后台...</div>
  </div>
</div>

<script type="module">
// ---- Version ----
async function loadVersionInfo() {
  try {
    const r = await fetch('/version.json?ts=' + Date.now(), { cache: 'no-store' });
    if (r.ok) return await r.json();
  } catch {}
  return { build: 'runtime-' + Date.now() };
}
const versionInfo = await loadVersionInfo();
const buildId = String(versionInfo.build || versionInfo.commit || Date.now());
const assetVersion = encodeURIComponent(buildId);
window.__APP_BUILD_INFO = versionInfo;

if (!new URLSearchParams(location.search).get('v')) {
  const next = new URL(location.href);
  next.searchParams.set('v', buildId);
  history.replaceState(null, '', next);
}

// Auto-refresh on version change
async function reloadIfUpdated() {
  try {
    const latest = await loadVersionInfo();
    if (String(latest.build || latest.commit || '') !== buildId) location.reload();
  } catch {}
}
window.addEventListener('focus', reloadIfUpdated);
document.addEventListener('visibilitychange', () => { if (!document.hidden) reloadIfUpdated(); });

// ---- Log (console only) ----
window._pushLog = function(level, msg, detail) {
  console.log('[FBIF]', level === 'error' ? '❌' : '✅', msg, detail || '');
};

// ---- Prefs ----
function loadPref(k, fb) { try { const v = localStorage.getItem(k); return v !== null ? v : fb; } catch { return fb; } }
function savePref(k, v) { try { localStorage.setItem(k, v); } catch {} }

// ---- Config: pure localStorage ----
const DEFAULT_CFG = { font_size:'15', heading_size:'18', text_color:'#544545', link_color:'#0070C0', line_height:'1.75', letter_spacing:'0.034', font_family:'PingFang SC' };
function loadConfig() { try { const r = localStorage.getItem('fbif_config'); if (r) return { ...DEFAULT_CFG, ...JSON.parse(r) }; } catch {} return { ...DEFAULT_CFG }; }
function saveConfig(c) { try { localStorage.setItem('fbif_config', JSON.stringify(c)); } catch {} window._activeConfig = { config: c }; }
window._activeConfig = { config: loadConfig() };

let footerEnabledPref = loadPref('footer_enabled', 'true') === 'true';

// ---- Load engine + template ----
let currentTemplateId = loadPref('preferred_template', 'fbif');
const { initApp } = await import('./js/engine.js?v=' + assetVersion);

async function loadTemplate(templateId) {
  currentTemplateId = templateId;
  savePref('preferred_template', templateId);
  document.querySelectorAll('.template-pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.template === templateId);
  });
  const mod = await import('./js/templates/' + templateId + '.js?v=' + assetVersion);
  initApp(mod.default);
  wrapEngineFunctions();
}

// Template pill click handlers
document.querySelectorAll('.template-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    const tid = btn.dataset.template;
    if (tid !== currentTemplateId) loadTemplate(tid);
  });
});

await loadTemplate(currentTemplateId);

document.getElementById('footerEnabled').checked = footerEnabledPref;
updateFooterBtn();

// ---- Toolbar: back ----
document.getElementById('backBtn').addEventListener('click', () => {
  window.goBack && window.goBack();
  document.getElementById('copySuccess').style.display = 'none';
  closeAllPanels();
});

// ---- Panel toggles ----
window.toggleTocPanel = function() {};
window.toggleSettingsPanel = function() {
  const sp = document.getElementById('settingsPanel');
  const open = sp.classList.toggle('open');
  document.getElementById('panelOverlay').classList.toggle('open', open);
};
window.closeAllPanels = function() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('open');
};

// ---- Footer toggle ----
function updateFooterBtn() {
  const on = document.getElementById('footerEnabled').checked;
  document.getElementById('footerToggleBtn').classList.toggle('on', on);
}
document.getElementById('footerToggleBtn').addEventListener('click', () => {
  const el = document.getElementById('footerEnabled');
  el.checked = !el.checked;
  footerEnabledPref = el.checked;
  savePref('footer_enabled', String(el.checked));
  updateFooterBtn();
  window._updateFooter && window._updateFooter(null);
});

// ---- Config form ----
function populateConfigForm() {
  const c = loadConfig();
  document.getElementById('cfg-font_size').value = parseFloat(c.font_size) || 15;
  document.getElementById('cfg-heading_size').value = parseFloat(c.heading_size) || 18;
  document.getElementById('cfg-line_height').value = parseFloat(c.line_height) || 1.75;
  document.getElementById('cfg-letter_spacing').value = parseFloat(c.letter_spacing) || 0.034;
  document.getElementById('cfg-font_family').value = c.font_family || 'PingFang SC';
  document.getElementById('cfg-text_color_picker').value = c.text_color || '#544545';
  document.getElementById('cfg-text_color_hex').textContent = c.text_color || '#544545';
  document.getElementById('cfg-link_color_picker').value = c.link_color || '#0070C0';
  document.getElementById('cfg-link_color_hex').textContent = c.link_color || '#0070C0';
}
populateConfigForm();

document.getElementById('settingsForm').addEventListener('input', (e) => {
  const c = loadConfig(), id = e.target.id;
  if (id === 'cfg-font_size') c.font_size = e.target.value;
  else if (id === 'cfg-heading_size') c.heading_size = e.target.value;
  else if (id === 'cfg-line_height') c.line_height = e.target.value;
  else if (id === 'cfg-letter_spacing') c.letter_spacing = e.target.value;
  else if (id === 'cfg-font_family') c.font_family = e.target.value;
  else if (id === 'cfg-text_color_picker') { c.text_color = e.target.value; document.getElementById('cfg-text_color_hex').textContent = e.target.value; }
  else if (id === 'cfg-link_color_picker') { c.link_color = e.target.value; document.getElementById('cfg-link_color_hex').textContent = e.target.value; }
  saveConfig(c);
  // Real-time theme update via CSS variables
  if (window.updateThemePreview) window.updateThemePreview(c);
});

// ---- Title display ----
const titleInput = document.getElementById('titleInput');
const articleTitle = document.getElementById('articleTitle');
const _od = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
Object.defineProperty(titleInput, 'value', {
  get() { return _od.get.call(this); },
  set(v) { _od.set.call(this, v); articleTitle.textContent = v; },
});

// ---- Set date in WeChat header ----
{
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
  const h = String(now.getHours()).padStart(2, '0'), mi = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('wxDate').textContent = y + '年' + m + '月' + d + '日 ' + h + ':' + mi;
}

// ---- Wrap engine functions (called after every loadTemplate) ----
function wrapEngineFunctions() {
  if (window.copyContent) {
    const origCopy = window.copyContent;
    window.copyContent = async function() {
      const btn = document.getElementById('copyBtn');
      await origCopy();
      document.getElementById('copySuccess').style.display = 'block';
      setTimeout(() => { window.open('https://mp.weixin.qq.com', '_blank'); }, 400);
      // Auto-reset after 10 seconds
      setTimeout(() => {
        btn.textContent = '复制到公众号';
        btn.classList.remove('copied');
        document.getElementById('copySuccess').style.display = 'none';
      }, 10000);
    };
  }
  if (window.goBack) {
    const origGoBack = window.goBack;
    window.goBack = function() {
      origGoBack();
      document.getElementById('copySuccess').style.display = 'none';
      closeAllPanels();
    };
  }
}

window._buildTOC = function() {};
window._positionTOC = function() {};

// ---- URL repost ----
window.fetchArticle = async function() {
  const urlInput = document.getElementById('urlInput');
  const btn = document.getElementById('urlFetchBtn');
  const errorEl = document.getElementById('error');
  const url = (urlInput.value || '').trim();
  if (!url) return;
  errorEl.style.display = 'none';
  btn.disabled = true; btn.textContent = '抓取中...';
  try {
    const resp = await fetch('/api/fetch-article', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url }) });
    if (!resp.ok) { const err = await resp.json().catch(() => ({ error: 'HTTP ' + resp.status })); throw new Error(err.error || '抓取失败'); }
    const { title, content } = await resp.json();
    if (!content) throw new Error('文章内容为空');
    const file = new File([content], (title || 'article') + '.md', { type: 'text/markdown' });
    const fi = document.getElementById('fileInput');
    const dt = new DataTransfer(); dt.items.add(file); fi.files = dt.files;
    fi.dispatchEvent(new Event('change'));
  } catch (e) { errorEl.textContent = '转载失败: ' + e.message; errorEl.style.display = 'block'; }
  finally { btn.disabled = false; btn.textContent = '抓取'; }
};

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', (e) => {
  const isPreview = document.getElementById('previewView').style.display === 'block';
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && isPreview) { e.preventDefault(); window.copyContent && window.copyContent(); }
  if (e.key === 'Escape' && isPreview) { e.preventDefault(); window.goBack && window.goBack(); }
});
document.addEventListener('paste', (e) => {
  const isUpload = document.getElementById('uploadView').style.display !== 'none';
  if (!isUpload || document.activeElement === document.getElementById('urlInput')) return;
  const text = (e.clipboardData || window.clipboardData).getData('text').trim();
  if (text && /^https?:\/\//i.test(text)) {
    e.preventDefault();
    document.getElementById('urlInput').value = text;
    window.fetchArticle();
  }
});
</script>
