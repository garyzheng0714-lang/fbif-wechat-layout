<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FBIF 微信排版工具</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
<link rel="stylesheet" href="/app.css">
</head>
<body>

<!-- Upload View -->
<div id="uploadView">
  <div class="container">
    <h1>FBIF 微信排版工具</h1>
    <p class="subtitle" id="pageSubtitle">选择模板，上传文档一键生成微信公众号格式</p>

    <div class="template-pills" id="templatePills">
      <button class="template-pill active" data-template="fbif">FBIF 公众号</button>
      <button class="template-pill" data-template="mote">Mote 排版</button>
    </div>

    <!-- Hidden element for engine.js compatibility -->
    <span id="pageTitle" style="display:none;"></span>

    <div class="upload-zone" id="dropZone">
      <div class="upload-icon">📄</div>
      <div class="upload-text">点击上传或拖拽文件到这里</div>
      <div class="upload-hint" id="fileHint">支持 .docx、.md、.txt 格式</div>
      <input type="file" id="fileInput">
      <div class="upload-url-row" onclick="event.stopPropagation()">
        <input type="url" id="urlInput" placeholder="或粘贴微信文章 / 网页链接">
        <button id="urlFetchBtn" onclick="fetchArticle()">抓取</button>
      </div>
    </div>

    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">正在排版...</div>
    </div>
    <div class="error" id="error"></div>
    <div class="batch-list" id="batchList" style="display:none;"></div>
  </div>
</div>

<!-- Preview View -->
<div id="previewView">
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="tb-back" id="backBtn" title="返回上传">← 返回</button>
      <span class="tb-title" id="filenameDisplay"></span>
    </div>
    <div class="toolbar-right">
      <button class="tb-retry-btn" id="retryBtn" onclick="retryUpload()" style="display:none;">重试上传</button>
      <button class="tb-template-chip" id="templateChip">
        <span id="templateChipLabel">FBIF</span>
        <span class="chip-arrow">&#9662;</span>
      </button>
      <div class="tb-chip-dropdown" id="templateChipDropdown">
        <button class="tb-chip-option active" data-template="fbif">FBIF 公众号</button>
        <button class="tb-chip-option" data-template="mote">Mote 排版</button>
      </div>
      <button class="tb-text-btn" id="settingsBtn" title="设置">⚙ 设置</button>
      <button class="tb-copy-btn" id="copyBtn" onclick="copyContent()">复制正文</button>
    </div>
    <span id="zoomLabel" style="display:none">200%</span>
  </div>

  <!-- Hidden elements preserved for engine.js compatibility -->
  <input type="hidden" id="titleInput" value="">
  <span id="previewTitleDisplay" style="display:none;"></span>
  <input type="checkbox" id="footerEnabled" checked style="display:none;">

  <!-- Copy success bar -->
  <div class="copy-success-bar" id="copySuccessBar">
    已复制到剪贴板 — 打开微信公众号后台，粘贴到编辑器即可
  </div>

  <!-- Settings Panel (slide-in from right) -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h3>设置</h3>
      <button class="settings-close" id="settingsClose">&times;</button>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">显示</div>
      <div class="settings-row">
        <div>
          <div class="settings-row-label">页脚模板</div>
          <div class="settings-row-hint">文章底部的品牌区块</div>
        </div>
        <button class="settings-toggle on" id="settingsFooterToggle"></button>
      </div>
      <div class="settings-row">
        <div>
          <div class="settings-row-label">预览宽度</div>
          <div class="settings-row-hint">模拟手机屏幕宽度</div>
        </div>
        <select class="settings-select" id="settingsZoom">
          <option value="50">50%</option>
          <option value="75">75%</option>
          <option value="100">100%</option>
          <option value="125">125%</option>
          <option value="150">150%</option>
          <option value="200" selected>200%</option>
        </select>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">配置方案</div>
      <div class="settings-profiles" id="settingsProfiles">
        <div style="font-size:12px;color:#9CA3AF;padding:8px 0">加载中...</div>
      </div>
    </div>
    <div class="settings-section" id="settingsConfigSection" style="display:none">
      <div class="settings-section-title">排版参数</div>
      <div class="cfg-form" id="settingsConfigForm">
        <label class="cfg-field">
          <span class="cfg-label">正文字号</span>
          <input class="cfg-input" id="cfg-font_size" placeholder="15px">
        </label>
        <label class="cfg-field">
          <span class="cfg-label">标题字号</span>
          <input class="cfg-input" id="cfg-heading_size" placeholder="18px">
        </label>
        <label class="cfg-field">
          <span class="cfg-label">正文颜色</span>
          <input class="cfg-input" id="cfg-text_color" placeholder="rgb(84, 69, 69)">
        </label>
        <label class="cfg-field">
          <span class="cfg-label">链接颜色</span>
          <input class="cfg-input" id="cfg-link_color" placeholder="rgb(0, 112, 192)">
        </label>
        <label class="cfg-field">
          <span class="cfg-label">行高</span>
          <input class="cfg-input" id="cfg-line_height" placeholder="1.75em">
        </label>
        <label class="cfg-field">
          <span class="cfg-label">字间距</span>
          <input class="cfg-input" id="cfg-letter_spacing" placeholder="0.034em">
        </label>
        <label class="cfg-field">
          <span class="cfg-label">字体</span>
          <input class="cfg-input cfg-input-wide" id="cfg-font_family" placeholder="PingFang SC, sans-serif">
        </label>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px;align-items:center">
        <input class="cfg-pwd" id="settingsPwd" type="password" placeholder="输入密码后保存">
        <button class="settings-save-btn" id="settingsSaveBtn">保存</button>
      </div>
      <div id="settingsEditMsg" style="font-size:11px;margin-top:6px;display:none"></div>
    </div>
  </div>

  <div class="preview-layout" id="previewLayout">
    <!-- Floating TOC -->
    <div class="toc-float" id="tocFloat">
      <div class="toc-title">目录</div>
      <ul class="toc-list" id="tocList">
        <li class="toc-empty">解析后显示</li>
      </ul>
    </div>

    <!-- Article Preview -->
    <div class="preview-main" id="previewMain">
      <div class="phone-frame" id="phoneFrame">
        <div id="contentArea"></div>
      </div>
    </div>
  </div>

  <div class="stats-bar" id="statsBar"></div>
</div>

<!-- Global Status Bar -->
<div id="globalStatusBar">
  <div id="statusHeader" onclick="document.getElementById('logPanel').classList.toggle('open'); this.querySelector('#statusToggle').textContent = document.getElementById('logPanel').classList.contains('open') ? '&#9660; 收起' : '&#9650; 展开日志'">
    <span id="statusVersion">加载中...</span>
    <span id="statusToggle">&#9650; 展开日志</span>
  </div>
  <div id="logPanel"></div>
</div>

<script type="module">
// ---- Version check ----
async function loadVersionInfo() {
  try {
    const resp = await fetch('/version.json?ts=' + Date.now(), { cache: 'no-store' });
    if (resp.ok) return await resp.json();
  } catch {}
  return { build: 'runtime-' + Date.now(), commit: 'runtime' };
}

const versionInfo = await loadVersionInfo();
const buildId = String(versionInfo.build || versionInfo.commit || Date.now());
const assetVersion = encodeURIComponent(buildId);
window.__APP_BUILD_INFO = versionInfo;

if (!new URLSearchParams(location.search).get('v')) {
  const next = new URL(location.href);
  next.searchParams.set('v', buildId);
  history.replaceState(null, '', next);
}

// Show version in global status bar
{
  const short = buildId.length > 8 ? buildId.substring(0, 7) : buildId;
  const deployedAt = versionInfo.deployed_at || '';
  const timeStr = deployedAt && deployedAt !== 'local'
    ? new Date(deployedAt).toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' })
    : 'local';
  const el = document.getElementById('statusVersion');
  if (el) el.textContent = 'v' + short + ' | ' + timeStr;
}

// ---- Global log system ----
window._pushLog = function(level, msg, detail) {
  const panel = document.getElementById('logPanel');
  if (!panel) return;
  const now = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const cls = level === 'error' ? 'log-error' : level === 'warn' ? 'log-warn' : 'log-info';
  const icon = level === 'error' ? '\u2717' : level === 'warn' ? '!' : '\u2713';
  let text = icon + ' ' + msg;
  if (detail && typeof detail === 'object') {
    const parts = [];
    for (const [k, v] of Object.entries(detail)) {
      if (typeof v === 'string' && v.length > 60) parts.push(k + '=' + v.substring(0, 57) + '...');
      else parts.push(k + '=' + v);
    }
    if (parts.length) text += ' (' + parts.join(', ') + ')';
  }
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = '<span class="log-time">' + now + '</span><span class="' + cls + '">' +
    text.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</span>';
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
};

// ---- Version auto-refresh ----
async function reloadIfUpdated() {
  try {
    const latest = await loadVersionInfo();
    const latestBuild = String(latest.build || latest.commit || '');
    if (latestBuild && latestBuild !== buildId) {
      console.log('[版本更新] ' + buildId + ' → ' + latestBuild + '，强制刷新');
      location.reload();
    }
  } catch {}
}
window.addEventListener('focus', reloadIfUpdated);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) reloadIfUpdated();
});

// ---- Template definitions ----
const TEMPLATES = {
  fbif: { id: 'fbif', label: 'FBIF 公众号', chipLabel: 'FBIF' },
  mote: { id: 'mote', label: 'Mote 排版', chipLabel: 'Mote' },
};

// ---- localStorage preferences ----
function loadPref(key, fallback) {
  try { const v = localStorage.getItem(key); return v !== null ? v : fallback; } catch { return fallback; }
}
function savePref(key, val) {
  try { localStorage.setItem(key, val); } catch {}
}

let currentTemplateId = loadPref('preferred_template', 'fbif');
// Also accept ?t= param for backward compat
const urlTemplate = new URLSearchParams(location.search).get('t');
if (urlTemplate && TEMPLATES[urlTemplate]) currentTemplateId = urlTemplate;
if (!TEMPLATES[currentTemplateId]) currentTemplateId = 'fbif';

let footerEnabledPref = loadPref('footer_enabled', 'true') === 'true';
let zoomIdxPref = parseInt(loadPref('zoom_index', ''), 10);

// ---- Load engine + template ----
const { initApp } = await import('./js/engine.js?v=' + assetVersion);

let _currentModule = null;
let _engineInitialized = false;

async function loadTemplate(templateId) {
  currentTemplateId = templateId;
  savePref('preferred_template', templateId);

  // Update pill UI
  document.querySelectorAll('.template-pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.template === templateId);
  });
  // Update chip UI
  const chipLabel = document.getElementById('templateChipLabel');
  if (chipLabel) chipLabel.textContent = TEMPLATES[templateId].chipLabel;
  document.querySelectorAll('.tb-chip-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.template === templateId);
  });

  try {
    const mod = await import('./js/templates/' + templateId + '.js?v=' + assetVersion);
    _currentModule = mod.default;
    initApp(_currentModule);
    _engineInitialized = true;

    // Wrap engine functions for UI hooks (success bar, zoom persist, etc.)
    wrapEngineFunctions();

    // Apply saved preferences after engine init
    const footerEl = document.getElementById('footerEnabled');
    footerEl.checked = footerEnabledPref;
    updateFooterIcon();
  } catch (err) {
    console.error('模板加载失败', templateId, err);
    document.getElementById('error').textContent = '模板加载失败: ' + templateId;
    document.getElementById('error').style.display = 'block';
  }
}

// ---- Template pill click handlers ----
document.querySelectorAll('.template-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    const tid = btn.dataset.template;
    if (tid !== currentTemplateId) loadTemplate(tid);
  });
});

// ---- Template chip in toolbar ----
const templateChip = document.getElementById('templateChip');
const templateChipDropdown = document.getElementById('templateChipDropdown');

templateChip.addEventListener('click', (e) => {
  e.stopPropagation();
  templateChipDropdown.classList.toggle('open');
});

document.addEventListener('click', () => {
  templateChipDropdown.classList.remove('open');
});

document.querySelectorAll('.tb-chip-option').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const tid = btn.dataset.template;
    templateChipDropdown.classList.remove('open');
    if (tid !== currentTemplateId) loadTemplate(tid);
  });
});

// ---- Back button ----
document.getElementById('backBtn').addEventListener('click', () => {
  window.goBack && window.goBack();
  hideCopySuccess();
});

// ---- Footer toggle (in settings panel) ----
const settingsFooterToggle = document.getElementById('settingsFooterToggle');

function updateFooterIcon() {
  const enabled = document.getElementById('footerEnabled').checked;
  settingsFooterToggle.classList.toggle('on', enabled);
}

function toggleFooterState() {
  const el = document.getElementById('footerEnabled');
  el.checked = !el.checked;
  footerEnabledPref = el.checked;
  savePref('footer_enabled', String(el.checked));
  updateFooterIcon();
  window.toggleFooter && window.toggleFooter();
}

settingsFooterToggle.addEventListener('click', toggleFooterState);

// ---- Settings panel ----
const settingsPanel = document.getElementById('settingsPanel');
document.getElementById('settingsBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  settingsPanel.classList.toggle('open');
});
document.getElementById('settingsClose').addEventListener('click', () => {
  settingsPanel.classList.remove('open');
});
// Close settings when clicking outside
document.addEventListener('click', (e) => {
  if (settingsPanel.classList.contains('open') &&
      !settingsPanel.contains(e.target) &&
      e.target.id !== 'settingsBtn') {
    settingsPanel.classList.remove('open');
  }
});

// Zoom select in settings
const settingsZoom = document.getElementById('settingsZoom');
settingsZoom.addEventListener('change', () => {
  const ZOOM_STEPS = [50, 75, 100, 125, 150, 200];
  const target = parseInt(settingsZoom.value, 10);
  const currentLabel = document.getElementById('zoomLabel').textContent;
  const current = parseInt(currentLabel, 10);
  const currentIdx = ZOOM_STEPS.indexOf(current);
  const targetIdx = ZOOM_STEPS.indexOf(target);
  if (currentIdx >= 0 && targetIdx >= 0 && window.zoom) {
    window.zoom(targetIdx - currentIdx);
  }
  savePref('zoom_index', String(targetIdx));
});

// ---- Config profile management ----
const CONFIG_PASSWORD = 'FBIF2026';
let _activeProfileId = null;
let _activeProfileConfig = null;

async function loadConfigProfiles() {
  const container = document.getElementById('settingsProfiles');
  try {
    const resp = await fetch('/api/config/profiles');
    if (!resp.ok) {
      container.innerHTML = '<div style="font-size:12px;color:#9CA3AF;padding:8px 0">API 不可用</div>';
      return;
    }
    const profiles = await resp.json();
    const activeResp = await fetch('/api/config/active');
    if (activeResp.ok) {
      const active = await activeResp.json();
      _activeProfileId = active.id;
      _activeProfileConfig = active.config;
    }

    container.innerHTML = '';
    profiles.forEach(p => {
      const isActive = p.id === _activeProfileId;
      const div = document.createElement('div');
      div.className = 'settings-profile-item' + (isActive ? ' active' : '');
      div.innerHTML = '<span class="settings-profile-name">' + (p.name || '配置 ' + p.id) + '</span>' +
        (isActive ? '<span class="settings-profile-badge">使用中</span>' : '');
      div.addEventListener('click', async () => {
        await fetch('/api/config/active', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ profile_id: p.id }),
        }).catch(() => {});
        loadConfigProfiles();
        loadActiveConfig();
      });
      container.appendChild(div);
    });

    // Populate config form fields
    if (_activeProfileConfig) {
      document.getElementById('settingsConfigSection').style.display = 'block';
      const cfg = _activeProfileConfig;
      const fields = ['font_size', 'heading_size', 'text_color', 'link_color', 'line_height', 'letter_spacing', 'font_family'];
      fields.forEach(f => {
        const el = document.getElementById('cfg-' + f);
        if (el && cfg[f] !== undefined) el.value = cfg[f];
      });
    }
  } catch {
    container.innerHTML = '<div style="font-size:12px;color:#9CA3AF;padding:8px 0">API 不可用</div>';
  }
}

// Save config from form fields
document.getElementById('settingsSaveBtn').addEventListener('click', async () => {
  const pwd = document.getElementById('settingsPwd').value;
  const msg = document.getElementById('settingsEditMsg');

  if (pwd !== CONFIG_PASSWORD) {
    msg.style.display = 'block';
    msg.style.color = '#DC2626';
    msg.textContent = '密码错误';
    return;
  }

  const fields = ['font_size', 'heading_size', 'text_color', 'link_color', 'line_height', 'letter_spacing', 'font_family'];
  const newConfig = { footer_enabled: document.getElementById('footerEnabled').checked };
  fields.forEach(f => {
    const el = document.getElementById('cfg-' + f);
    if (el) newConfig[f] = el.value;
  });

  try {
    const resp = await fetch('/api/config/profiles/' + _activeProfileId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ config: newConfig }),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    msg.style.display = 'block';
    msg.style.color = '#059669';
    msg.textContent = '已保存';
    document.getElementById('settingsPwd').value = '';
    setTimeout(() => { msg.style.display = 'none'; }, 2000);
    loadConfigProfiles();
    loadActiveConfig();
  } catch (e) {
    msg.style.display = 'block';
    msg.style.color = '#DC2626';
    msg.textContent = '保存失败: ' + e.message;
  }
});

loadConfigProfiles();

// ---- Copy success bar ----
function showCopySuccess() {
  const bar = document.getElementById('copySuccessBar');
  bar.classList.add('visible');
  document.getElementById('previewLayout').classList.add('with-success-bar');
  document.getElementById('previewMain').classList.add('with-success-bar');
  // Adjust TOC position
  const toc = document.getElementById('tocFloat');
  if (toc) toc.style.top = '104px';
}
function hideCopySuccess() {
  const bar = document.getElementById('copySuccessBar');
  bar.classList.remove('visible');
  document.getElementById('previewLayout').classList.remove('with-success-bar');
  document.getElementById('previewMain').classList.remove('with-success-bar');
  const toc = document.getElementById('tocFloat');
  if (toc) toc.style.top = '68px';
}

// ---- Filename display in toolbar ----
// engine.js sets titleInput.value, so we observe it
const titleInput = document.getElementById('titleInput');
const filenameDisplay = document.getElementById('filenameDisplay');

// Intercept engine.js setting titleInput.value
const _origTitleDescriptor = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
Object.defineProperty(titleInput, 'value', {
  get() { return _origTitleDescriptor.get.call(this); },
  set(v) {
    _origTitleDescriptor.set.call(this, v);
    filenameDisplay.textContent = v;
  },
});

// ---- Load active config from server ----
window._activeConfig = null;
async function loadActiveConfig() {
  try {
    const resp = await fetch('/api/config/active');
    if (resp.ok) {
      window._activeConfig = await resp.json();
      const cfg = window._activeConfig.config;
      if (cfg) {
        const serverFooter = cfg.footer_enabled !== false;
        document.getElementById('footerEnabled').checked = footerEnabledPref;
        updateFooterIcon();
      }
    }
  } catch {}
}
async function saveFooterToggle(enabled) {
  if (!window._activeConfig) return;
  const cfg = { ...window._activeConfig.config, footer_enabled: enabled };
  try {
    await fetch('/api/config/profiles/' + window._activeConfig.id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ config: cfg }),
    });
  } catch {}
}
loadActiveConfig();

// ---- Footer toggle (called by engine.js) ----
window.toggleFooter = function() {
  window._updateFooter && window._updateFooter(null);
  const enabled = document.getElementById('footerEnabled').checked;
  saveFooterToggle(enabled);
};

// ---- Build TOC from headings ----
window._buildTOC = function() {
  const tocList = document.getElementById('tocList');
  tocList.innerHTML = '';
  const sections = document.getElementById('contentArea').querySelectorAll('section');
  let headingIdx = 0;

  sections.forEach(sec => {
    const span = sec.querySelector('span[textstyle]') || sec.querySelector('span');
    if (!span) return;
    const style = span.getAttribute('style') || '';
    const isBoldHeading = (style.includes('font-weight: bold') || style.includes('font-weight:bold')) &&
      (style.includes('font-size: 18px') || style.includes('font-size:18px'));
    if (!isBoldHeading) return;

    const text = sec.textContent.trim();
    if (!text) return;

    sec.id = 'heading-' + headingIdx;
    const li = document.createElement('li');
    li.className = 'toc-item';
    li.textContent = text;
    li.addEventListener('click', () => {
      sec.scrollIntoView({ behavior: 'instant', block: 'start' });
      tocList.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
      li.classList.add('active');
    });
    tocList.appendChild(li);
    headingIdx++;
  });

  if (headingIdx === 0) {
    tocList.innerHTML = '<li class="toc-empty">无标题</li>';
  }
};

// ---- URL repost ----
window.fetchArticle = async function() {
  const urlInput = document.getElementById('urlInput');
  const btn = document.getElementById('urlFetchBtn');
  const errorEl = document.getElementById('error');
  const url = (urlInput.value || '').trim();
  if (!url) return;

  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '抓取中...';

  try {
    const resp = await fetch('/api/fetch-article', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: 'HTTP ' + resp.status }));
      throw new Error(err.error || '抓取失败');
    }
    const { title, content } = await resp.json();
    if (!content) throw new Error('文章内容为空');

    const file = new File([content], (title || 'article') + '.md', { type: 'text/markdown' });
    const fileInput = document.getElementById('fileInput');
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
    fileInput.dispatchEvent(new Event('change'));
  } catch (e) {
    errorEl.textContent = '转载失败: ' + e.message;
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '抓取';
  }
};

// ---- TOC positioning ----
function positionTOC() {
  const toc = document.getElementById('tocFloat');
  const frame = document.getElementById('phoneFrame');
  if (!toc || !frame) return;
  const rect = frame.getBoundingClientRect();
  const tocWidth = toc.offsetWidth;
  const left = rect.left - tocWidth - 16;
  // Only show TOC if there's enough space (tocWidth + 24px margin)
  if (left < 24) {
    toc.style.display = 'none';
  } else {
    toc.style.left = left + 'px';
    toc.style.display = 'block';
  }
}

function updateScrollSpy() {
  const items = document.querySelectorAll('.toc-item');
  const previewMain = document.getElementById('previewMain');
  if (!previewMain || !items.length) return;
  const scrollTop = previewMain.scrollTop;
  let activeIdx = 0;
  items.forEach((item, idx) => {
    const headingId = 'heading-' + idx;
    const heading = document.getElementById(headingId);
    if (heading && heading.offsetTop - 100 <= scrollTop) activeIdx = idx;
  });
  items.forEach((item, idx) => item.classList.toggle('active', idx === activeIdx));
}

window._positionTOC = positionTOC;
window.addEventListener('resize', positionTOC);

let _updateTimer = null;
const observer = new MutationObserver(() => {
  if (_updateTimer) clearTimeout(_updateTimer);
  _updateTimer = setTimeout(() => {
    window._buildTOC();
    positionTOC();
  }, 200);
});
observer.observe(document.getElementById('contentArea'), { childList: true });
document.getElementById('previewMain').addEventListener('scroll', updateScrollSpy);

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', (e) => {
  const isPreview = document.getElementById('previewView').style.display === 'block';

  // Cmd/Ctrl+Enter — copy in preview mode
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && isPreview) {
    e.preventDefault();
    window.copyContent && window.copyContent();
    return;
  }

  // Escape — go back from preview to upload
  if (e.key === 'Escape' && isPreview) {
    e.preventDefault();
    window.goBack && window.goBack();
    hideCopySuccess();
    return;
  }
});

// Smart paste: if clipboard contains URL in upload mode, auto-fill URL input
document.addEventListener('paste', (e) => {
  const isUpload = document.getElementById('uploadView').style.display !== 'none';
  if (!isUpload) return;

  // Don't intercept if user is typing in the URL input already
  if (document.activeElement === document.getElementById('urlInput')) return;

  const text = (e.clipboardData || window.clipboardData).getData('text').trim();
  if (text && /^https?:\/\//i.test(text)) {
    e.preventDefault();
    const urlInput = document.getElementById('urlInput');
    urlInput.value = text;
    urlInput.focus();
    window.fetchArticle();
  }
});

const copyBtn = document.getElementById('copyBtn');

// ---- Wrap engine functions after each loadTemplate call ----
// Called after initApp() sets window.copyContent / goBack / zoom
function wrapEngineFunctions() {
  // Wrap copyContent to show success bar
  if (window.copyContent) {
    const origCopy = window.copyContent;
    window.copyContent = async function() {
      await origCopy();
      // engine.js already sets green + stays; we add the success bar
      showCopySuccess();
    };
  }

  // Wrap goBack to hide success bar
  if (window.goBack) {
    const origGoBack = window.goBack;
    window.goBack = function() {
      origGoBack();
      hideCopySuccess();
    };
  }

  // Wrap zoom to persist preference
  if (window.zoom) {
    const origZoom = window.zoom;

    // Apply saved zoom preference
    if (!isNaN(zoomIdxPref) && zoomIdxPref >= 0) {
      const ZOOM_STEPS = [50, 75, 100, 125, 150, 200];
      const diff = zoomIdxPref - (ZOOM_STEPS.length - 1);
      if (diff !== 0) origZoom(diff);
    }

    window.zoom = function(dir) {
      origZoom(dir);
      const label = document.getElementById('zoomLabel').textContent;
      const ZOOM_STEPS = [50, 75, 100, 125, 150, 200];
      const pct = parseInt(label, 10);
      const idx = ZOOM_STEPS.indexOf(pct);
      if (idx >= 0) savePref('zoom_index', String(idx));
    };
  }
}

// ---- Initialize first template ----
await loadTemplate(currentTemplateId);

</script>
