<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FBIF 微信排版工具</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
h1 { font-size: 28px; color: #1a1a1a; margin-bottom: 8px; }
.subtitle { color: #666; font-size: 15px; margin-bottom: 32px; }
.back-link { color: #0070C0; text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 16px; }
.back-link:hover { text-decoration: underline; }
.upload-zone {
  border: 2px dashed #d0d0d0; border-radius: 12px; padding: 60px 40px;
  text-align: center; background: #fff; cursor: pointer; transition: all 0.2s;
}
.upload-zone:hover, .upload-zone.dragover { border-color: #0070C0; background: #f8fbff; }
.upload-zone.processing { border-color: #faad14; background: #fffbe6; pointer-events: none; }
.upload-icon { font-size: 48px; margin-bottom: 16px; }
.upload-text { font-size: 16px; color: #333; margin-bottom: 8px; }
.upload-hint { font-size: 13px; color: #999; }
input[type="file"] { display: none; }
.progress { display: none; margin-top: 24px; }
.progress-bar { height: 4px; background: #e8e8e8; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #0070C0; width: 0%; transition: width 0.3s; }
.progress-text { font-size: 13px; color: #666; margin-top: 8px; text-align: center; }
.error { color: #ff4d4f; margin-top: 16px; font-size: 14px; display: none; }

#previewView { display: none; }
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #e8e8e8; padding: 12px 20px;
  display: flex; align-items: center; gap: 12px;
}
.toolbar h2 { font-size: 16px; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn {
  padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px;
  cursor: pointer; transition: all 0.2s; font-weight: 500; white-space: nowrap;
}
.btn-primary { background: #0070C0; color: #fff; }
.btn-primary:hover { background: #005a9e; }
.btn-primary.copied { background: #27ae60; }
.btn-draft { background: #07c160; color: #fff; }
.btn-draft:hover { background: #06ad56; }
.btn-draft.pushed { background: #27ae60; }
.btn-draft:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-secondary { background: #f0f0f0; color: #333; text-decoration: none; }
.btn-secondary:hover { background: #e0e0e0; }
.zoom-controls {
  display: flex; align-items: center; gap: 4px; background: #f0f0f0;
  border-radius: 6px; padding: 2px;
}
.zoom-controls .btn { padding: 6px 12px; font-size: 16px; min-width: 36px; }
.zoom-label { font-size: 13px; color: #666; min-width: 45px; text-align: center; }

/* ---- Layout: Preview with floating TOC ---- */
.preview-layout {
  margin-top: 60px; min-height: calc(100vh - 60px);
  position: relative;
}

/* Floating TOC — sticks to left of phone frame */
.toc-float {
  position: fixed; top: 80px; z-index: 50;
  background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 12px; max-width: 180px; max-height: calc(100vh - 120px);
  overflow-y: auto; border: 1px solid #eee;
}
.toc-title { font-size: 12px; font-weight: 600; color: #999; margin-bottom: 8px; }
.toc-list { list-style: none; }
.toc-item {
  padding: 5px 8px; font-size: 12px; color: #666; cursor: pointer;
  border-radius: 4px; margin-bottom: 1px; line-height: 1.4;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: all 0.15s; border-left: 2px solid transparent;
}
.toc-item:hover { color: #0070C0; background: #f8fbff; }
.toc-item.active { color: #0070C0; font-weight: 500; border-left-color: #0070C0; }
.toc-empty { font-size: 11px; color: #ccc; padding: 4px 8px; }

/* Preview center */
.preview-main {
  padding: 12px; overflow-y: auto; height: calc(100vh - 60px);
}
.phone-frame {
  max-width: 840px; margin: 0 auto; background: #fff;
  border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden; transition: max-width 0.3s ease;
}
.phone-frame img { max-width: 100%; height: auto; }
.stats-bar {
  position: fixed; bottom: 46px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); color: #fff; padding: 8px 20px;
  border-radius: 20px; font-size: 13px; z-index: 100;
}
/* ---- Global Status Bar (always visible) ---- */
#globalStatusBar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
  background: #1a1a2e; color: #ccc; font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  font-size: 12px; border-top: 1px solid #333;
}
#statusHeader {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 16px; cursor: pointer; user-select: none;
}
#statusHeader:hover { background: #252540; }
#statusVersion { color: #4fc3f7; font-weight: 600; }
#statusToggle { color: #888; font-size: 10px; }
#logPanel {
  max-height: 220px; overflow-y: auto; border-top: 1px solid #333;
  padding: 4px 0; display: none;
}
#logPanel.open { display: block; }
.log-entry {
  padding: 3px 16px; line-height: 1.5; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.log-entry:hover { background: rgba(255,255,255,0.03); }
.log-time { color: #666; margin-right: 8px; }
.log-info { color: #4fc3f7; }
.log-warn { color: #ffb74d; }
.log-error { color: #ef5350; }
</style>
</head>
<body>

<!-- Upload View -->
<div id="uploadView">
  <div class="container">
    <a href="/" class="back-link">&larr; 返回选择</a>
    <h1 id="pageTitle"></h1>
    <p class="subtitle" id="pageSubtitle"></p>
    <div class="upload-zone" id="dropZone">
      <div class="upload-icon">📄</div>
      <div class="upload-text">点击上传或拖拽文件到这里</div>
      <div class="upload-hint" id="fileHint"></div>
      <input type="file" id="fileInput">
    </div>
    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">正在排版...</div>
    </div>
    <div class="error" id="error"></div>
  </div>
</div>

<!-- Preview View -->
<div id="previewView">
  <div class="toolbar">
    <h2 id="previewTitleDisplay"></h2>
    <div class="zoom-controls">
      <button class="btn btn-secondary" onclick="zoom(-1)">-</button>
      <span class="zoom-label" id="zoomLabel">200%</span>
      <button class="btn btn-secondary" onclick="zoom(1)">+</button>
    </div>
    <button class="btn btn-secondary" onclick="goBack()">&#8592; 重新上传</button>
    <button class="btn btn-primary" id="copyBtn" onclick="copyContent()">复制正文</button>
    <button class="btn btn-secondary" id="diagBtn" onclick="toggleDiag()" title="查看剪贴板诊断">🔍</button>
    <button class="btn btn-draft" id="draftBtn" onclick="pushToDraft()">推送到公众号草稿箱</button>
  </div>

  <div class="preview-layout">
    <!-- Floating TOC -->
    <div class="toc-float" id="tocFloat">
      <div class="toc-title">目录</div>
      <ul class="toc-list" id="tocList">
        <li class="toc-empty">解析后显示</li>
      </ul>
    </div>

    <!-- Article Preview -->
    <div class="preview-main" id="previewMain">
      <div class="phone-frame" id="phoneFrame">
        <div id="contentArea"></div>
      </div>
    </div>
  </div>

  <!-- Hidden state elements (used by engine.js) -->
  <img id="coverImg" style="display:none;">
  <input type="text" id="titleInput" maxlength="32" style="display:none;">
  <input type="checkbox" id="footerEnabled" checked style="display:none;">
  <div class="stats-bar" id="statsBar"></div>

  <!-- Clipboard Diagnostic Panel -->
  <div id="diagPanel" style="display:none; position:fixed; top:60px; right:16px; z-index:200; width:420px; max-height:calc(100vh - 80px); background:#fff; border-radius:10px; box-shadow:0 4px 24px rgba(0,0,0,0.15); overflow:hidden; font-size:13px;">
    <div style="padding:12px 16px; background:#f8f8f8; border-bottom:1px solid #eee; display:flex; align-items:center; justify-content:space-between;">
      <strong>剪贴板诊断</strong>
      <button onclick="toggleDiag()" style="border:none; background:none; font-size:18px; cursor:pointer; color:#999;">&times;</button>
    </div>
    <div id="diagContent" style="padding:16px; overflow-y:auto; max-height:calc(100vh - 140px);">
      <div style="color:#999; text-align:center; padding:20px;">点击「复制正文」后这里会显示诊断信息</div>
    </div>
  </div>
</div>

<!-- Global Status Bar — always visible at bottom -->
<div id="globalStatusBar">
  <div id="statusHeader" onclick="document.getElementById('logPanel').classList.toggle('open'); this.querySelector('#statusToggle').textContent = document.getElementById('logPanel').classList.contains('open') ? '▼ 收起' : '▲ 展开日志'">
    <span id="statusVersion">加载中...</span>
    <span id="statusToggle">▲ 展开日志</span>
  </div>
  <div id="logPanel"></div>
</div>

<script type="module">
async function loadVersionInfo() {
  try {
    const resp = await fetch('/version.json?ts=' + Date.now(), { cache: 'no-store' });
    if (resp.ok) return await resp.json();
  } catch {
    // fall through to runtime fallback
  }
  return { build: 'runtime-' + Date.now(), commit: 'runtime' };
}

const versionInfo = await loadVersionInfo();
const buildId = String(versionInfo.build || versionInfo.commit || Date.now());
const assetVersion = encodeURIComponent(buildId);
window.__APP_BUILD_INFO = versionInfo;

if (!new URLSearchParams(location.search).get('v')) {
  const next = new URL(location.href);
  next.searchParams.set('v', buildId);
  history.replaceState(null, '', next);
}

// Show version in global status bar
{
  const short = buildId.length > 8 ? buildId.substring(0, 7) : buildId;
  const deployedAt = versionInfo.deployed_at || '';
  const timeStr = deployedAt && deployedAt !== 'local'
    ? new Date(deployedAt).toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' })
    : 'local';
  const el = document.getElementById('statusVersion');
  if (el) el.textContent = 'v' + short + ' | ' + timeStr;
}

// Global log system — engine.js pushes logs here via window._pushLog
window._pushLog = function(level, msg, detail) {
  const panel = document.getElementById('logPanel');
  if (!panel) return;
  const now = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const cls = level === 'error' ? 'log-error' : level === 'warn' ? 'log-warn' : 'log-info';
  const icon = level === 'error' ? '✗' : level === 'warn' ? '!' : '✓';
  let text = icon + ' ' + msg;
  if (detail && typeof detail === 'object') {
    const parts = [];
    for (const [k, v] of Object.entries(detail)) {
      if (typeof v === 'string' && v.length > 60) parts.push(k + '=' + v.substring(0, 57) + '...');
      else parts.push(k + '=' + v);
    }
    if (parts.length) text += ' (' + parts.join(', ') + ')';
  }
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = '<span class="log-time">' + now + '</span><span class="' + cls + '">' +
    text.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</span>';
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
};

// Force refresh: check every 30s + on focus/visibility
async function reloadIfUpdated() {
  try {
    const latest = await loadVersionInfo();
    const latestBuild = String(latest.build || latest.commit || '');
    if (latestBuild && latestBuild !== buildId) {
      console.log('[版本更新] ' + buildId + ' → ' + latestBuild + '，强制刷新');
      location.reload();
    }
  } catch {
    // ignore transient check failures
  }
}

window.addEventListener('focus', reloadIfUpdated);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) reloadIfUpdated();
});
setInterval(reloadIfUpdated, 30000);

const { initApp } = await import('./js/engine.js?v=' + assetVersion);

const TEMPLATES = ['fbif', 'mote'];
const params = new URLSearchParams(location.search);
const templateId = params.get('t') || 'fbif';

if (!TEMPLATES.includes(templateId)) {
  document.getElementById('error').textContent = '未知模板: ' + templateId;
  document.getElementById('error').style.display = 'block';
} else {
  try {
    const mod = await import('./js/templates/' + templateId + '.js?v=' + assetVersion);
    initApp(mod.default);
  } catch (err) {
    console.error('模板加载失败', templateId, err);
    document.getElementById('error').textContent = '模板加载失败: ' + templateId;
    document.getElementById('error').style.display = 'block';
  }
}

// Auto-set first image as cover
window._populateArticleThumbnails = function() {
  const imgs = document.getElementById('contentArea').querySelectorAll('img');
  const coverImg = document.getElementById('coverImg');
  if (imgs.length > 0 && imgs[0].src) {
    coverImg.src = imgs[0].src;
  }
};

// Build TOC from headings in content
window._buildTOC = function() {
  const tocList = document.getElementById('tocList');
  tocList.innerHTML = '';

  // Find all heading sections (font-size: 18px or font-weight: bold with larger size)
  const sections = document.getElementById('contentArea').querySelectorAll('section');
  let headingIdx = 0;

  sections.forEach(sec => {
    const span = sec.querySelector('span[textstyle]') || sec.querySelector('span');
    if (!span) return;
    const style = span.getAttribute('style') || '';
    const isBoldHeading = (style.includes('font-weight: bold') || style.includes('font-weight:bold')) &&
      (style.includes('font-size: 18px') || style.includes('font-size:18px'));
    if (!isBoldHeading) return;

    const text = sec.textContent.trim();
    if (!text) return;

    sec.id = 'heading-' + headingIdx;
    const li = document.createElement('li');
    li.className = 'toc-item';
    li.textContent = text;
    li.addEventListener('click', () => {
      sec.scrollIntoView({ behavior: 'instant', block: 'start' });
      tocList.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
      li.classList.add('active');
    });
    tocList.appendChild(li);
    headingIdx++;
  });

  if (headingIdx === 0) {
    tocList.innerHTML = '<li class="toc-empty">无标题</li>';
  }
};

// Footer toggle
window.toggleFooter = function() {
  window._updateFooter && window._updateFooter(null);
};

// Position TOC float next to phone frame
function positionTOC() {
  const toc = document.getElementById('tocFloat');
  const frame = document.getElementById('phoneFrame');
  if (!toc || !frame) return;
  const rect = frame.getBoundingClientRect();
  const tocWidth = toc.offsetWidth;
  const left = rect.left - tocWidth - 16;
  toc.style.left = Math.max(8, left) + 'px';
  toc.style.display = left > 0 ? 'block' : 'none';
}

// Scroll spy — highlight active TOC item based on scroll position
function updateScrollSpy() {
  const items = document.querySelectorAll('.toc-item');
  const previewMain = document.getElementById('previewMain');
  if (!previewMain || !items.length) return;
  const scrollTop = previewMain.scrollTop;
  let activeIdx = 0;
  items.forEach((item, idx) => {
    const headingId = 'heading-' + idx;
    const heading = document.getElementById(headingId);
    if (heading && heading.offsetTop - 100 <= scrollTop) activeIdx = idx;
  });
  items.forEach((item, idx) => item.classList.toggle('active', idx === activeIdx));
}

// Expose positionTOC for engine.js zoom callback
window._positionTOC = positionTOC;
window.addEventListener('resize', positionTOC);

// Initial and content-change observers
let _updateTimer = null;
const observer = new MutationObserver(() => {
  if (_updateTimer) clearTimeout(_updateTimer);
  _updateTimer = setTimeout(() => {
    window._populateArticleThumbnails();
    window._buildTOC();
    positionTOC();
  }, 200);
});
observer.observe(document.getElementById('contentArea'), { childList: true });

// Scroll spy
document.getElementById('previewMain').addEventListener('scroll', updateScrollSpy);

// ---- Diagnostic Panel ----
window.toggleDiag = function() {
  const panel = document.getElementById('diagPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
};

window._updateDiagPanel = function(analysis) {
  const el = document.getElementById('diagContent');
  if (!el) return;
  const method = window.getClipboardHtml ? '✓' : '—';
  const statusColor = analysis.dataUriCount > 0 || analysis.missingSrcCount > 0 ? '#ff4d4f' : '#27ae60';
  let html = '<div style="margin-bottom:12px;">' +
    '<div style="display:inline-block;padding:4px 10px;border-radius:4px;background:' + statusColor + ';color:#fff;font-weight:500;margin-bottom:8px;">' +
    (analysis.dataUriCount > 0 || analysis.missingSrcCount > 0 ? '⚠ 有问题' : '✓ 正常') + '</div>' +
    '<table style="width:100%;border-collapse:collapse;font-size:12px;">';
  const rows = [
    ['HTML 大小', (analysis.htmlLength / 1024).toFixed(1) + ' KB'],
    ['图片总数', analysis.imgCount],
    ['GIF 动图', analysis.gifCount],
    ['mmbiz CDN', analysis.mmbizCount],
    ['data:URI (未上传)', analysis.dataUriCount, analysis.dataUriCount > 0 ? '#ff4d4f' : ''],
    ['缺失 src', analysis.missingSrcCount, analysis.missingSrcCount > 0 ? '#ff4d4f' : ''],
  ];
  for (const [label, value, color] of rows) {
    html += '<tr><td style="padding:4px 8px;border-bottom:1px solid #f0f0f0;color:#666;">' + label +
      '</td><td style="padding:4px 8px;border-bottom:1px solid #f0f0f0;font-weight:500;' +
      (color ? 'color:' + color : '') + ';">' + value + '</td></tr>';
  }
  html += '</table></div>';

  // Image list
  html += '<div style="margin-top:8px;"><strong style="font-size:12px;">图片详情：</strong>';
  html += '<div style="max-height:300px;overflow-y:auto;margin-top:6px;">';
  for (let i = 0; i < analysis.images.length; i++) {
    const img = analysis.images[i];
    const icon = img.dataType === 'gif' ? '🎞' : '🖼';
    const status = !img.hasSrc ? '❌ 无src' : img.isDataUri ? '❌ 未上传' : img.isMmbiz ? '✅' : '⚠ 非CDN';
    html += '<div style="padding:6px 8px;border-bottom:1px solid #f5f5f5;font-size:11px;line-height:1.5;">' +
      '<div>' + icon + ' #' + (i + 1) + ' ' + status + ' <code style="color:#666;">' + (img.dataType || '—') + '</code></div>' +
      '<div style="color:#999;word-break:break-all;">' + img.src + '</div>' +
      '</div>';
  }
  html += '</div></div>';

  // Copy raw HTML button
  html += '<div style="margin-top:12px;text-align:center;">' +
    '<button onclick="navigator.clipboard.writeText(window.getClipboardHtml()).then(()=>this.textContent=\'已复制HTML源码!\')" ' +
    'style="padding:6px 16px;border:1px solid #d9d9d9;border-radius:4px;background:#fff;cursor:pointer;font-size:12px;">复制 HTML 源码 (调试用)</button></div>';

  el.innerHTML = html;
};
</script>
</body>
</html>
