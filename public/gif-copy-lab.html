<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GIF Copy Lab</title>
<style>
:root {
  --bg: #f3f0ea;
  --card: #fffdf9;
  --line: #e6ddd1;
  --text: #2e2a26;
  --muted: #73685d;
  --accent: #0b67c2;
  --accent-2: #127f56;
  --danger: #b74b3f;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(11,103,194,0.08), transparent 30%),
    radial-gradient(circle at top right, rgba(18,127,86,0.08), transparent 26%),
    var(--bg);
}
.wrap { max-width: 1120px; margin: 0 auto; padding: 24px 16px 48px; }
.hero {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(60, 40, 20, 0.06);
}
.hero h1 { margin: 0 0 10px; font-size: 28px; }
.hero p { margin: 8px 0 0; line-height: 1.7; color: var(--muted); }
.grid {
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) minmax(320px, 420px);
  gap: 18px;
  margin-top: 18px;
}
.panel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(60, 40, 20, 0.06);
}
.panel h2 { margin: 0 0 12px; font-size: 18px; }
.variant-list { display: grid; gap: 12px; }
.variant {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 14px;
  background: rgba(255,255,255,0.7);
}
.variant.active {
  border-color: rgba(11,103,194,0.35);
  box-shadow: 0 0 0 3px rgba(11,103,194,0.08);
}
.variant-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.variant-title { font-size: 17px; font-weight: 700; }
.variant-desc { margin: 8px 0 0; line-height: 1.7; color: var(--muted); font-size: 14px; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.btn {
  appearance: none;
  border: none;
  border-radius: 999px;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: rgba(11,103,194,0.09); color: var(--accent); }
.btn-success { background: var(--accent-2); color: #fff; }
.status {
  min-height: 24px;
  margin-top: 12px;
  font-size: 14px;
  color: var(--muted);
}
.status.ok { color: var(--accent-2); }
.status.err { color: var(--danger); }
.preview-shell {
  background: #f4efe8;
  border-radius: 18px;
  padding: 16px;
}
.preview-card {
  margin: 0 auto;
  max-width: 760px;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 14px 40px rgba(50, 35, 20, 0.08);
  overflow: hidden;
}
.preview-body { padding: 18px; }
.preview-body img { max-width: 100%; height: auto; }
.meta {
  font-size: 13px;
  line-height: 1.7;
  color: var(--muted);
  padding: 12px 14px 0;
}
.html-box {
  margin-top: 14px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: #fff;
  overflow: hidden;
}
.html-box pre {
  margin: 0;
  padding: 14px;
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 340px;
  overflow: auto;
}
.note {
  margin-top: 12px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--muted);
}
@media (max-width: 980px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>GIF 复制实验页</h1>
    <p>这页固定使用你给的《美国品牌死亡之水》源文件前两张 GIF，而且已经重新上传到你当前公众号账号对应的微信 CDN。你只要逐个点“复制方案”，再去公众号后台粘贴测试即可。</p>
    <p>推荐测试顺序：先试 `B`，再试 `D`，再试 `E`。如果某个方案能显示 GIF，我们就直接把主流程收敛到那一套。</p>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>复制方案</h2>
      <div class="variant-list" id="variantList"></div>
      <div class="status" id="statusText"></div>
      <div class="note">实验范围只聚焦 GIF 粘贴，不改你现有推草稿箱流程。右侧会同步显示当前方案预览和实际复制的 HTML。</div>
    </div>

    <div class="panel">
      <h2>当前方案预览</h2>
      <div class="preview-shell">
        <div class="preview-card">
          <div class="meta" id="variantMeta"></div>
          <div class="preview-body" id="previewBody"></div>
        </div>
      </div>
      <div class="html-box">
        <pre id="htmlPreview"></pre>
      </div>
    </div>
  </div>
</div>

<script>
const CDN_GIF_1 = 'https://mmbiz.qpic.cn/sz_mmbiz_gif/ia0DGYsqRkDyamEiawicRofVtGSsyibxekZfibTulN67jwVGGlueX9mzVrJZc4ILcnVyXWSHnziaM88UgGTCogGGiaPAudh05AL4tiaT0fEibLDwUWB0/0?wx_fmt=gif';
const CDN_GIF_2 = 'https://mmbiz.qpic.cn/sz_mmbiz_gif/ia0DGYsqRkDyDMdGd6ePuicOeZzIojwe08UHicho0t8HricreA64a9qzGBpU6oIGkpjdxtKrERCyQgEDficsxSka7Vx2LufU8407H8yZkGUicEEqQ/0?wx_fmt=gif';
const PLACEHOLDER_GIF = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';
const ARTICLE_TITLE = '美国品牌死亡之水：把水装进啤酒罐，溢价5倍？';
const AUTHOR = '刀姐doris';

function textSection(text, extraStyle = '') {
  return '<section style="text-align:left;margin:0 8px;padding-bottom:20px;line-height:1.75em;' + extraStyle + '">' +
    '<span leaf="" style="color:rgba(0,0,0,0.9);font-size:17px;font-family:PingFang SC,Microsoft YaHei,sans-serif;letter-spacing:0.034em;">' +
    '<span textstyle="" style="font-size:15px;color:rgb(84,69,69);">' + text + '</span></span></section>';
}

function authorSection() {
  return '<section style="text-align:left;margin:0 8px;padding-bottom:20px;line-height:1.75em;">' +
    '<span leaf="" style="color:rgb(0,112,192);font-size:15px;font-style:italic;font-family:PingFang SC,Microsoft YaHei,sans-serif;letter-spacing:0.034em;">' +
    '<span textstyle="" style="font-size:15px;color:rgb(0,112,192);font-style:italic;">作者：' + AUTHOR + '</span></span></section>';
}

function buildArticle(renderImage) {
  return [
    authorSection(),
    renderImage(CDN_GIF_1, 0),
    textSection('在快消品里，瓶装水几乎是最难讲故事的品类之一。'),
    textSection('这么多年，大家都在重复同一套语言体系：水源地、纯净、健康、家庭、天然。比来比去，无非是谁更干净，谁更高级。'),
    renderImage(CDN_GIF_2, 1),
    textSection('2019 年创立，5 年内做到 14 亿美元估值，价格卖到普通瓶装水的 5 倍左右，硬生生在一个极度成熟、极度同质化的市场里，杀出了一条没人走过的路。', 'font-weight:bold;')
  ].join('\n');
}

function imageSection(attrs) {
  return '<section style="text-align:center;margin:0 8px;padding-bottom:20px;">' +
    '<img ' + attrs + ' style="width:100%;display:block;margin:0 auto;" /></section>';
}

function escHtml(value) {
  return value.replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
}

const variants = [
  {
    id: 'A',
    name: 'A. 最简 GIF 标记',
    desc: '只保留 src + data-type=\"gif\"。这是最基础、最接近早期思路的版本。',
    copyHtml: buildArticle((url) => imageSection('src="' + url + '" data-type="gif"')),
    previewHtml: buildArticle((url) => imageSection('src="' + url + '" data-type="gif"'))
  },
  {
    id: 'B',
    name: 'B. 当前主流程简化版',
    desc: 'src + data-src + data-type + rich_pages/wxw-img，接近当前线上复制结构，但去掉一部分非关键属性。',
    copyHtml: buildArticle((url) => imageSection('src="' + url + '" data-src="' + url + '" data-type="gif" class="rich_pages wxw-img" alt="图片"')),
    previewHtml: buildArticle((url) => imageSection('src="' + url + '" data-src="' + url + '" data-type="gif" class="rich_pages wxw-img" alt="图片"'))
  },
  {
    id: 'C',
    name: 'C. GIF 强标记版',
    desc: '在 B 的基础上增加 __bg_gif、js_insertlocalimg、data-gif-singleurl、data-cover，尽量向微信自身 GIF 结构靠拢。',
    copyHtml: buildArticle((url) => imageSection('src="' + url + '" data-src="' + url + '" data-type="gif" class="rich_pages wxw-img js_insertlocalimg __bg_gif" data-gif-singleurl="' + url + '" data-cover="' + url + '" alt="图片"')),
    previewHtml: buildArticle((url) => imageSection('src="' + url + '" data-src="' + url + '" data-type="gif" class="rich_pages wxw-img js_insertlocalimg __bg_gif" data-gif-singleurl="' + url + '" data-cover="' + url + '" alt="图片"'))
  },
  {
    id: 'D',
    name: 'D. 占位 src + 真实 data-src',
    desc: '把 src 改成 1x1 占位 GIF，只把真实 GIF 放进 data-src。这是最值得试的一版，因为很多微信原生内容就是这种懒加载结构。',
    copyHtml: buildArticle((url) => imageSection('src="' + PLACEHOLDER_GIF + '" data-src="' + url + '" data-type="gif" class="rich_pages wxw-img js_insertlocalimg __bg_gif" data-gif-singleurl="' + url + '" data-cover="' + url + '" alt="图片"')),
    previewHtml: buildArticle((url) => imageSection('src="' + url + '" data-src="' + url + '" data-type="gif" class="rich_pages wxw-img js_insertlocalimg __bg_gif" data-gif-singleurl="' + url + '" data-cover="' + url + '" alt="图片"'))
  },
  {
    id: 'E',
    name: 'E. 全属性版',
    desc: '保留 rich_pages/wxw-img/js_insertlocalimg/__bg_gif，并补齐 data-ratio、data-w、data-s、data-index、_width 等元数据。',
    copyHtml: buildArticle((url, index) => imageSection(
      'src="' + url + '"' +
      ' data-src="' + url + '"' +
      ' data-type="gif"' +
      ' class="rich_pages wxw-img js_insertlocalimg __bg_gif"' +
      ' data-gif-singleurl="' + url + '"' +
      ' data-cover="' + url + '"' +
      ' data-ratio="0.5625"' +
      ' data-w="640"' +
      ' data-s="360,640"' +
      ' data-index="' + index + '"' +
      ' data-report-img-idx="' + index + '"' +
      ' data-fail="0"' +
      ' data-imgfileid="' + (100000001 + index) + '"' +
      ' data-original-style="width:100%;display:block;margin:0 auto;"' +
      ' _width="640"' +
      ' alt="图片"'
    )),
    previewHtml: buildArticle((url, index) => imageSection(
      'src="' + url + '"' +
      ' data-src="' + url + '"' +
      ' data-type="gif"' +
      ' class="rich_pages wxw-img js_insertlocalimg __bg_gif"' +
      ' data-gif-singleurl="' + url + '"' +
      ' data-cover="' + url + '"' +
      ' data-ratio="0.5625"' +
      ' data-w="640"' +
      ' data-s="360,640"' +
      ' data-index="' + index + '"' +
      ' data-report-img-idx="' + index + '"' +
      ' data-fail="0"' +
      ' data-imgfileid="' + (100000001 + index) + '"' +
      ' data-original-style="width:100%;display:block;margin:0 auto;"' +
      ' _width="640"' +
      ' alt="图片"'
    ))
  }
];

let activeVariant = variants[1];

function renderVariants() {
  const host = document.getElementById('variantList');
  host.innerHTML = variants.map((variant) => (
    '<div class="variant' + (variant.id === activeVariant.id ? ' active' : '') + '" data-id="' + variant.id + '">' +
      '<div class="variant-top">' +
        '<div class="variant-title">' + variant.name + '</div>' +
      '</div>' +
      '<div class="variant-desc">' + variant.desc + '</div>' +
      '<div class="btn-row">' +
        '<button class="btn btn-primary" onclick="copyVariant(\'' + variant.id + '\')">复制方案 ' + variant.id + '</button>' +
        '<button class="btn btn-secondary" onclick="selectVariant(\'' + variant.id + '\')">查看 HTML</button>' +
      '</div>' +
    '</div>'
  )).join('');
}

function renderPreview() {
  document.getElementById('variantMeta').textContent = '当前方案：' + activeVariant.name + ' | 文章：' + ARTICLE_TITLE;
  document.getElementById('previewBody').innerHTML = activeVariant.previewHtml;
  document.getElementById('htmlPreview').textContent = activeVariant.copyHtml;
  renderVariants();
}

async function copyHtmlToClipboard(html) {
  const plainText = 'GIF Copy Lab - ' + ARTICLE_TITLE;
  let ok = false;

  const handler = function(e) {
    e.clipboardData.setData('text/html', html);
    e.clipboardData.setData('text/plain', plainText);
    e.preventDefault();
  };

  document.addEventListener('copy', handler, true);
  try {
    const range = document.createRange();
    range.selectNodeContents(document.getElementById('previewBody'));
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    ok = document.execCommand('copy');
    sel.removeAllRanges();
  } finally {
    document.removeEventListener('copy', handler, true);
  }

  if (!ok && navigator.clipboard && typeof ClipboardItem !== 'undefined') {
    await navigator.clipboard.write([new ClipboardItem({
      'text/html': new Blob([html], { type: 'text/html' }),
      'text/plain': new Blob([plainText], { type: 'text/plain' })
    })]);
    ok = true;
  }

  return ok;
}

window.selectVariant = function(id) {
  activeVariant = variants.find((variant) => variant.id === id) || variants[0];
  renderPreview();
  const status = document.getElementById('statusText');
  status.className = 'status';
  status.textContent = '已切换到方案 ' + activeVariant.id + '，可以直接点击复制测试。';
};

window.copyVariant = async function(id) {
  activeVariant = variants.find((variant) => variant.id === id) || variants[0];
  renderPreview();
  const status = document.getElementById('statusText');
  status.className = 'status';
  status.textContent = '正在复制方案 ' + activeVariant.id + '...';
  try {
    const ok = await copyHtmlToClipboard(activeVariant.copyHtml);
    status.className = ok ? 'status ok' : 'status err';
    status.textContent = ok
      ? '方案 ' + activeVariant.id + ' 已复制。现在直接去公众号后台粘贴测试。'
      : '方案 ' + activeVariant.id + ' 复制失败。';
  } catch (err) {
    status.className = 'status err';
    status.textContent = '方案 ' + activeVariant.id + ' 复制失败：' + err.message;
  }
};

renderPreview();
</script>
</body>
</html>
